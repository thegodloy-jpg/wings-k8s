# statefulset-mindie-ascend-dist.yaml
# 用途：ST 昇腾 MindIE 分布式验证 StatefulSet
# 日期：2026-03-03
# 目标：7.6.52.110（rank-0/infer-0）+ 7.6.52.170（rank-1/infer-1）
# 部署环境：k3s-verify-server-ascend-zhanghui / k3s-verify-agent-ascend-zhanghui
# namespace：wings-verify-st-dist
#
# 说明：
#   - PodAntiAffinity 强制两个 Pod 调度到不同物理节点
#   - NODE_RANK 通过 DownwardAPI 注入（Pod 序号 = rank）
#   - HEAD_NODE_ADDR 固定为 infer-0.infer-hl 的 DNS
#   - NODE_IPS 用于 wings 自动计算 worldSize（两节点逗号分隔 IP）
#   - NPU 访问：privileged + hostPath /dev/davinci0 + /dev/davinci_manager
#     （k3s 内无 Ascend Device Plugin，通过 privileged 直接访问设备节点）
#   - 模型：cephfs /mnt/cephfs/models/DeepSeek-R1-Distill-Qwen-1.5B
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: infer
  namespace: wings-verify-st-dist
  labels:
    app: infer-st-dist
    owner: zhanghui
    version: "20260303"
spec:
  serviceName: infer-hl
  replicas: 2
  selector:
    matchLabels:
      app: infer-st-dist
  template:
    metadata:
      labels:
        app: infer-st-dist
        owner: zhanghui
    spec:
      # 强制两个 Pod 调度到不同物理节点（.110 和 .170）
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: infer-st-dist
              topologyKey: kubernetes.io/hostname

      hostNetwork: true     # 直接使用宿主机网络，HCCL 跨节点通信使用真实 IP
      dnsPolicy: ClusterFirstWithHostNet

      volumes:
        - name: shared-volume
          emptyDir: {}
        - name: model-volume
          hostPath:
            path: /mnt/cephfs/models
            type: DirectoryOrCreate
        # Ascend 设备文件（k3s 无 device plugin，直接 hostPath 传入）
        - name: davinci0
          hostPath:
            path: /dev/davinci0
            type: CharDevice
        - name: davinci-manager
          hostPath:
            path: /dev/davinci_manager
            type: CharDevice
        - name: hisi-hdc
          hostPath:
            path: /dev/hisi_hdc
        - name: ascend-driver
          hostPath:
            path: /usr/local/Ascend/driver
            type: Directory
        - name: ascend-driver-lib
          hostPath:
            path: /usr/local/Ascend/driver/lib64
            type: Directory

      containers:
        # ============================================================
        # wings-infer 控制容器
        # rank-0：生成 start_command.sh（包含 MASTER_ADDR/RANK/HCCL env）
        #         启动 proxy(18000) + health(19000)
        # rank-1：生成 worker start_command.sh，不启动 proxy
        # ============================================================
        - name: wings-infer
          image: wings-infer:zhanghui-ascend-st-dist
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18000
              name: proxy
            - containerPort: 19000
              name: health
          env:
            # ---- 硬件类型 ----
            - name: WINGS_DEVICE
              value: "ascend"
            - name: DEVICE
              value: "ascend"
            - name: DEVICE_COUNT
              value: "1"

            # ---- 分布式参数 ----
            - name: DISTRIBUTED
              value: "true"
            - name: NNODES
              value: "2"
            - name: NODE_RANK
              valueFrom:
                fieldRef:
                  # StatefulSet Pod 序号（infer-0 → 0，infer-1 → 1）
                  fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
            - name: HEAD_NODE_ADDR
              value: "7.6.52.110"         # rank-0 宿主机 IP（hostNetwork 模式下直接用真实 IP）
            - name: NODE_IPS
              value: "7.6.52.110,7.6.52.170"   # 所有节点 IP（逗号分隔，顺序与 rank 一致）

            # ---- 引擎配置 ----
            - name: ENGINE
              value: "mindie"
            # mindie 无需 DISTRIBUTED_EXECUTOR_BACKEND（内部 HCCL 多节点）

            # ---- 模型配置 ----
            - name: MODEL_NAME
              value: "DeepSeek-R1-Distill-Qwen-1.5B"
            - name: MODEL_PATH
              value: "/models/DeepSeek-R1-Distill-Qwen-1.5B"

            # ---- 端口规划 ----
            - name: PORT
              value: "18000"
            - name: HEALTH_PORT
              value: "19000"

            # ---- K8s sidecar 模式 ----
            - name: WINGS_SKIP_PID_CHECK
              value: "true"

          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"

          readinessProbe:
            httpGet:
              path: /health
              port: 19000
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 54         # 容忍 9 分钟冷启动（mindie 启动较慢）
          livenessProbe:
            httpGet:
              path: /health
              port: 19000
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 5

        # ============================================================
        # MindIE 引擎容器
        # NPU 访问：privileged + hostPath /dev/davinci0 等设备节点
        # ============================================================
        - name: engine
          image: mindie:2.2.RC1
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true             # 打通 /dev/davinci* 等 Ascend 设备访问

          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "[engine] Starting MindIE engine container (rank=${RANK:-0})"

              echo "[engine] Waiting for start_command.sh..."
              while [ ! -f /shared-volume/start_command.sh ]; do
                sleep 2
              done

              echo "[engine] start_command.sh found:"
              cat /shared-volume/start_command.sh

              echo "[engine] Executing..."
              cd /shared-volume
              bash start_command.sh

          env:
            - name: ASCEND_VISIBLE_DEVICES
              value: "0"                 # 使用 NPU 0（k3s 无 device plugin，靠 privileged 直接访问）

          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
            # Ascend 设备节点
            - name: davinci0
              mountPath: /dev/davinci0
            - name: davinci-manager
              mountPath: /dev/davinci_manager
            - name: hisi-hdc
              mountPath: /dev/hisi_hdc
            # Ascend 驱动库（mindie 镜像内需要 libascend_hal 等）
            - name: ascend-driver-lib
              mountPath: /usr/local/Ascend/driver/lib64
              readOnly: true

          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
            limits:
              cpu: "16"
              memory: "48Gi"
              # huawei.com/Ascend910B 不申请（k3s 内无 Ascend Device Plugin）
              # NPU 访问通过 privileged + hostPath davinci 设备节点实现
