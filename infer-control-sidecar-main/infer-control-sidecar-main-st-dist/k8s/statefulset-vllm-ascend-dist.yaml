# statefulset-vllm-ascend-dist.yaml
# 用途：ST 昇腾 vllm-ascend Ray 分布式验证 StatefulSet
# 日期：2026-03-04
# 目标：7.6.52.110（rank-0/infer-vllm-0）+ 7.6.52.170（rank-1/infer-vllm-1）
# 部署环境：k3s-verify-server-ascend-zhanghui / k3s-verify-agent-ascend-zhanghui
# namespace：wings-verify-st-dist
#
# 说明：
#   - PodAntiAffinity 强制两个 Pod 调度到不同物理节点
#   - NODE_RANK 通过 DownwardAPI 注入（Pod 序号 = rank）
#   - HEAD_NODE_ADDR=7.6.52.110（hostNetwork 模式直接用宿主机真实 IP）
#   - DistributedExecutorBackend=ray：rank-0 启动 ray head + vllm serve
#                                   rank-1 连接 ray head --block
#   - NPU 访问：privileged + hostPath /dev/davinci0 + 设备管理文件
#   - CANN 已内嵌于 vllm-ascend 镜像，无需从宿主机注入驱动库
#   - 模型：cephfs /mnt/cephfs/models/DeepSeek-R1-Distill-Qwen-1.5B
# ---------------------------------------------------------------------------

# 注意：如果 namespace 已通过 service-vllm-ascend-dist.yaml 创建，
#       可以跳过此段，kubectl apply 幂等无副作用。
# ---
# apiVersion: v1
# kind: Namespace
# metadata:
#   name: wings-verify-st-dist

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: infer-vllm
  namespace: wings-verify-st-dist
  labels:
    app: infer-vllm-ascend-dist
    owner: zhanghui
    version: "20260304"
spec:
  serviceName: infer-hl-vllm
  replicas: 2
  podManagementPolicy: Parallel    # 并行启动，避免 head 等 worker、worker 等 head 的死锁
  selector:
    matchLabels:
      app: infer-vllm-ascend-dist
  template:
    metadata:
      labels:
        app: infer-vllm-ascend-dist
        owner: zhanghui
    spec:
      # 强制两个 Pod 调度到不同物理节点（.110 和 .170）
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: infer-vllm-ascend-dist
              topologyKey: kubernetes.io/hostname

      hostNetwork: true     # 直接使用宿主机网络，Ray/HCCL 跨节点通信使用真实 IP
      dnsPolicy: ClusterFirstWithHostNet

      # 容忍 .170 节点因磁盘使用率 90% 超过默认 85% 阈值产生的 disk-pressure 污点
      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule

      volumes:
        - name: shared-volume
          emptyDir: {}
        - name: model-volume
          hostPath:
            path: /mnt/cephfs/models
            type: DirectoryOrCreate
        # Ascend 设备文件（k3s 无 device plugin，直接 hostPath 传入）
        - name: davinci0
          hostPath:
            path: /dev/davinci0
            type: CharDevice
        - name: davinci-manager
          hostPath:
            path: /dev/davinci_manager
            type: CharDevice
        - name: hisi-hdc
          hostPath:
            path: /dev/hisi_hdc
        # Ascend 宿主机驱动（仅挂载 lib64/driver 子目录，包含 libascend_hal.so）
        # 不挂载整个 /usr/local/Ascend/driver，避免 common/ 下宿主机驱动库
        # （libmmpa.so 等 v25.x）与容器内 CANN 8.5.0 库版本冲突
        - name: ascend-driver
          hostPath:
            path: /usr/local/Ascend/driver/lib64/driver
            type: DirectoryOrCreate
        # Ray 共享内存（默认 /dev/shm 仅 64MB，Ray 需要更大空间）
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi

      containers:
        # ============================================================
        # wings-infer 控制容器
        # rank-0：生成 start_command.sh（ray head + vllm serve）
        #         启动 proxy(18000) + health(19000)
        # rank-1：生成 ray worker start_command.sh，不启动 proxy
        # ============================================================
        - name: wings-infer
          image: wings-infer:zhanghui-ascend-st-dist
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18100
              name: proxy
            - containerPort: 19100
              name: health
          env:
            # ---- 硬件类型 ----
            - name: WINGS_DEVICE
              value: "ascend"
            - name: DEVICE
              value: "ascend"
            - name: DEVICE_COUNT
              value: "1"

            # ---- 分布式参数 ----
            - name: DISTRIBUTED
              value: "true"
            - name: NNODES
              value: "2"
            - name: NODE_RANK
              valueFrom:
                fieldRef:
                  # StatefulSet Pod 序号（infer-vllm-0 → 0，infer-vllm-1 → 1）
                  fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
            - name: HEAD_NODE_ADDR
              # 使用 .110 的真实宿主机 IP（hostNetwork 模式，k3s-in-Docker 环境 DNS 不可用）
              # 需确保 infer-vllm-0 调度到 .110（通过 cordon/uncordon 或 nodeSelector 控制）
              value: "7.6.52.110"
            - name: NODE_IPS
              value: "7.6.52.110,7.6.52.170"   # 所有节点 IP（逗号分隔，顺序与 rank 一致）

            # ---- 引擎配置 ----
            - name: ENGINE
              value: "vllm_ascend"
            - name: DISTRIBUTED_EXECUTOR_BACKEND
              value: "ray"
            - name: TENSOR_PARALLEL_SIZE
              value: "1"        # 单节点 TP=1，vllm_adapter 会在脚本中用 --tensor-parallel-size {nnodes}=2

            # ---- 模型配置 ----
            - name: MODEL_NAME
              value: "DeepSeek-R1-Distill-Qwen-1.5B"
            - name: MODEL_PATH
              value: "/models/DeepSeek-R1-Distill-Qwen-1.5B"

            # ---- 端口规划 ----
            # 注意：18100/19100 避免与同机器运行的 mindie pods（18000/19000）失生争 hostNetwork 端口
            - name: ENGINE_PORT
              value: "17000"       # vllm serve 监听端口
            - name: PORT
              value: "18100"       # wings proxy 端口（vllm）
            - name: HEALTH_PORT
              value: "19100"       # wings health 端口（vllm）

            # ---- K8s sidecar 模式 ----
            - name: WINGS_SKIP_PID_CHECK
              value: "true"
            - name: BACKEND_URL
              value: "http://127.0.0.1:17000"

          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"

          readinessProbe:
            httpGet:
              path: /health
              port: 19100
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 72         # 容忍 12 分钟冷启动（ray 启动 + 等待 worker + 模型加载）
          livenessProbe:
            httpGet:
              path: /health
              port: 19100
            initialDelaySeconds: 240
            periodSeconds: 30
            failureThreshold: 5

        # ============================================================
        # vllm-ascend 引擎容器
        # rank-0：执行 start_command.sh → ray start --head + vllm serve
        # rank-1：执行 start_command.sh → ray start --address=head:6379 --block
        # NPU 访问：privileged + hostPath /dev/davinci0 等设备节点
        # CANN/ATB 已内嵌于镜像，无需从宿主机注入
        # ============================================================
        - name: engine
          image: quay.io/ascend/vllm-ascend:v0.14.0rc1
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true             # 打通 /dev/davinci* 等 Ascend 设备访问

          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "[engine] Starting vllm-ascend engine container"

              echo "[engine] Waiting for start_command.sh..."
              while [ ! -f /shared-volume/start_command.sh ]; do
                sleep 2
              done

              echo "[engine] start_command.sh found:"
              cat /shared-volume/start_command.sh

              echo "[engine] Executing..."
              cd /shared-volume
              bash start_command.sh

          env:
            # ASCEND_VISIBLE_DEVICES 在 k3s 内无 Ascend Docker Runtime 时无效
            # privileged 模式下默认使用 NPU 0（物理 davinci0）
            # vllm-ascend TP 模式 local_rank=0 → torch.npu.set_device(0)，自动选 NPU 0
            - name: ASCEND_VISIBLE_DEVICES
              value: "0"
            # POD_IP: hostNetwork pods 的 status.podIP 等于节点真实 IP
            # start_command.sh 使用 $POD_IP 设置 VLLM_HOST_IP（替代不可用的 ip 命令）
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP

          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
            # Ascend 设备节点（vllm-ascend 镜像内置 CANN，仅需透传设备文件）
            - name: davinci0
              mountPath: /dev/davinci0
            - name: davinci-manager
              mountPath: /dev/davinci_manager
            - name: hisi-hdc
              mountPath: /dev/hisi_hdc
            # Ascend 宿主机驱动（仅 libascend_hal.so，挂载到 set_env.sh 搜索路径）
            - name: ascend-driver
              mountPath: /usr/local/Ascend/driver/lib64/driver
              readOnly: true
            # Ray 共享内存
            - name: dshm
              mountPath: /dev/shm

          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
            limits:
              cpu: "24"
              memory: "64Gi"
              # huawei.com/Ascend910B 不申请（k3s 内无 Ascend Device Plugin）
              # NPU 访问通过 privileged + hostPath davinci 设备节点实现
