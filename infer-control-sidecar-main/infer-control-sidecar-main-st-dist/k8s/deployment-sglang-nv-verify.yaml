# deployment-sglang-nv-verify.yaml
# 用途：NV 单节点 SGLang 验证
# 日期：2026-03-03
# 目标：7.6.52.148（a100节点，L20）
# 方案：单副本 SGLang，ENGINE=sglang，tp=1
# namespace：wings-verify-dist
#
# 前置：需先将 .148 Docker 镜像 sglang-infer:zhanghui-20260228 导入 k3s containerd：
#   docker save sglang-infer:zhanghui-20260228 | docker exec -i k3s-verify-server-zhanghui \
#     ctr -n k8s.io images import -
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infer-sglang
  namespace: wings-verify-dist
  labels:
    app: infer-sglang-nv
    owner: zhanghui
    version: "20260303"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: infer-sglang-nv
  template:
    metadata:
      labels:
        app: infer-sglang-nv
        owner: zhanghui
    spec:
      # 固定在 .148（a100 节点），因 SGLang 镜像只在该节点 k3s 中
      nodeSelector:
        kubernetes.io/hostname: a100

      volumes:
        - name: shared-volume
          emptyDir: {}
        - name: model-volume
          hostPath:
            path: /mnt/models
            type: DirectoryOrCreate
        - name: nvidia-libs
          hostPath:
            path: /mnt/nvidia-libs
            type: Directory
        # nvidia 设备节点 — k3s-in-Docker 中必须显式挂载
        - name: dev-nvidia0
          hostPath:
            path: /dev/nvidia0
            type: CharDevice
        - name: dev-nvidia1
          hostPath:
            path: /dev/nvidia1
            type: CharDevice
        - name: dev-nvidiactl
          hostPath:
            path: /dev/nvidiactl
            type: CharDevice
        - name: dev-nvidia-uvm
          hostPath:
            path: /dev/nvidia-uvm
            type: CharDevice
        - name: dev-nvidia-uvm-tools
          hostPath:
            path: /dev/nvidia-uvm-tools
            type: CharDevice
        - name: dev-nvidia-modeset
          hostPath:
            path: /dev/nvidia-modeset
            type: CharDevice

      containers:
        # ============================================================
        # wings-infer 控制容器
        # SGLang 模式：生成 python3 -m sglang.launch_server 启动命令
        # ============================================================
        - name: wings-infer
          image: wings-infer:dist-nv-dev-zhanghui
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18000
              name: proxy
            - containerPort: 19000
              name: health
          env:
            # ---- 引擎配置 ----
            - name: ENGINE
              value: "sglang"
            - name: ENGINE_PORT
              value: "17000"

            # ---- 模型配置 ----
            - name: MODEL_NAME
              value: "DeepSeek-R1-Distill-Qwen-1.5B"
            - name: MODEL_PATH
              value: "/models/DeepSeek-R1-Distill-Qwen-1.5B"
            - name: TP_SIZE
              value: "1"
            - name: MAX_MODEL_LEN
              value: "2048"

            # ---- 端口规划 ----
            - name: PORT
              value: "18000"
            - name: HEALTH_PORT
              value: "19000"
            - name: WINGS_PORT
              value: "18000"

            # ---- K8s sidecar 模式 ----
            - name: WINGS_SKIP_PID_CHECK
              value: "true"
            - name: ENABLE_ACCEL
              value: "false"

          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: false

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"

          readinessProbe:
            httpGet:
              path: /health
              port: 19000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 36
          livenessProbe:
            httpGet:
              path: /health
              port: 19000
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5

        # ============================================================
        # 引擎容器（SGLang）
        # 镜像：sglang-infer:zhanghui-20260228（需先导入 k3s）
        # GPU：privileged + hostPath nvidia-libs
        # ============================================================
        - name: engine
          image: sglang-infer:zhanghui-20260228
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true

          command: ["/bin/sh", "-c"]
          args:
            - |
              export LD_LIBRARY_PATH=/usr/lib/nvidia-host:${LD_LIBRARY_PATH:-}

              # 在 k3s-in-Docker 环境中直接 exec ELF 二进制可能报 ENOEXEC，
              # 创建 shell 脚本包装器让 Python subprocess 通过 shebang 调用 sh 来绕过
              mkdir -p /usr/local/bin
              printf '#!/bin/sh\nexec /usr/bin/nvidia-smi "$@"\n' > /usr/local/bin/nvidia-smi
              chmod +x /usr/local/bin/nvidia-smi
              export PATH=/usr/local/bin:${PATH:-/usr/bin:/bin}

              echo "[engine] nvidia-smi wrapper test:"
              /usr/local/bin/nvidia-smi --query-gpu=memory.total --format=csv,noheader,nounits 2>&1 || echo "[warn] nvidia-smi wrapper failed, creating static fallback"
              # 如果包装器也失败，改用静态输出（L20=46068MiB, idx 0）
              if ! /usr/local/bin/nvidia-smi --query-gpu=memory.total --format=csv,noheader,nounits > /dev/null 2>&1; then
                printf '#!/bin/sh\necho "46068"\n' > /usr/local/bin/nvidia-smi
                chmod +x /usr/local/bin/nvidia-smi
                echo "[engine] Using static nvidia-smi fallback (L20 46068MiB)"
              fi

              echo "[engine] SGLang mode - waiting for start_command.sh..."
              while [ ! -f /shared-volume/start_command.sh ]; do
                sleep 2
              done
              echo "[engine] start_command.sh found:"
              cat /shared-volume/start_command.sh
              echo "[engine] Executing..."
              cd /shared-volume
              bash start_command.sh

          env:
            - name: CUDA_VISIBLE_DEVICES
              value: "1"
            - name: CUDA_DEVICE_ORDER
              value: "PCI_BUS_ID"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"

          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
            - name: nvidia-libs
              mountPath: /usr/lib/nvidia-host
            - name: dev-nvidia0
              mountPath: /dev/nvidia0
            - name: dev-nvidia1
              mountPath: /dev/nvidia1
            - name: dev-nvidiactl
              mountPath: /dev/nvidiactl
            - name: dev-nvidia-uvm
              mountPath: /dev/nvidia-uvm
            - name: dev-nvidia-uvm-tools
              mountPath: /dev/nvidia-uvm-tools
            - name: dev-nvidia-modeset
              mountPath: /dev/nvidia-modeset

          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
            limits:
              cpu: "16"
              memory: "48Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: infer-sglang-api
  namespace: wings-verify-dist
  labels:
    app: infer-sglang-nv
    owner: zhanghui
spec:
  type: ClusterIP
  selector:
    app: infer-sglang-nv
  ports:
    - name: proxy
      port: 18000
      targetPort: 18000
      protocol: TCP
    - name: health
      port: 19000
      targetPort: 19000
      protocol: TCP
