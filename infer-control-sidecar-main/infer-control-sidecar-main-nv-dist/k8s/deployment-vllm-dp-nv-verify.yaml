# deployment-vllm-dp-nv-verify.yaml
# 用途：NV 单节点 vLLM Data Parallel 验证（无 Ray）
# 日期：2026-03-03
# 目标：.148（L20 = CUDA idx 1）单副本验证 vLLM DP 基础能力
# 方案：nodeSelector=a100，CUDA_VISIBLE_DEVICES=1（L20），显式挂载 nvidia 设备节点
# namespace：wings-verify-dist
#
# 对比 Ray 方案差异：
#   - 去掉 DISTRIBUTED / NODE_RANK / HEAD_NODE_ADDR / NNODES / DISTRIBUTED_EXECUTOR_BACKEND
#   - wings-infer 生成单进程 vLLM 启动命令（tp=1）
#   - engine 容器直接执行 start_command.sh，无需 ray start 协调
#
# GPU 访问说明：
#   k3s-in-Docker 场景中，pod privileged:true 不会自动继承 /dev/nvidia*，
#   需要显式通过 hostPath 挂载设备节点文件（CharDevice）
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infer-dp
  namespace: wings-verify-dist
  labels:
    app: infer-dp-nv
    owner: zhanghui
    version: "20260303"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: infer-dp-nv
  template:
    metadata:
      labels:
        app: infer-dp-nv
        owner: zhanghui
    spec:
      # 固定调度到 .148（a100 节点），含 L20(idx=1) + A100(idx=0)
      nodeSelector:
        kubernetes.io/hostname: a100

      volumes:
        - name: shared-volume
          emptyDir: {}
        - name: model-volume
          hostPath:
            path: /mnt/models
            type: DirectoryOrCreate
        - name: nvidia-libs
          hostPath:
            path: /mnt/nvidia-libs
            type: Directory
        # nvidia 设备节点 — k3s-in-Docker 中必须显式挂载
        - name: dev-nvidia0
          hostPath:
            path: /dev/nvidia0
            type: CharDevice
        - name: dev-nvidia1
          hostPath:
            path: /dev/nvidia1
            type: CharDevice
        - name: dev-nvidiactl
          hostPath:
            path: /dev/nvidiactl
            type: CharDevice
        - name: dev-nvidia-uvm
          hostPath:
            path: /dev/nvidia-uvm
            type: CharDevice
        - name: dev-nvidia-uvm-tools
          hostPath:
            path: /dev/nvidia-uvm-tools
            type: CharDevice
        - name: dev-nvidia-modeset
          hostPath:
            path: /dev/nvidia-modeset
            type: CharDevice

      containers:
        # ============================================================
        # wings-infer 控制容器
        # DP 模式：生成单进程 vLLM 启动命令写入 start_command.sh
        # 端口：17000=引擎后端  18000=proxy(对外)  19000=health
        # ============================================================
        - name: wings-infer
          image: wings-infer:dist-nv-dev-zhanghui
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18000
              name: proxy
            - containerPort: 19000
              name: health
          env:
            # ---- 引擎配置 ----
            - name: ENGINE
              value: "vllm"
            - name: ENGINE_PORT
              value: "17000"

            # ---- 无分布式标志：vllm_adapter 生成单进程启动命令 ----
            # DISTRIBUTED 不设置（默认 false）
            # 无 NODE_RANK / NNODES / HEAD_NODE_ADDR / DISTRIBUTED_EXECUTOR_BACKEND

            # ---- 模型配置 ----
            - name: MODEL_NAME
              value: "DeepSeek-R1-Distill-Qwen-1.5B"
            - name: MODEL_PATH
              value: "/models/DeepSeek-R1-Distill-Qwen-1.5B"
            - name: TP_SIZE
              value: "1"
            - name: MAX_MODEL_LEN
              value: "2048"

            # ---- 端口规划 ----
            - name: PORT
              value: "18000"
            - name: HEALTH_PORT
              value: "19000"
            - name: WINGS_PORT
              value: "18000"

            # ---- K8s sidecar 模式 ----
            - name: WINGS_SKIP_PID_CHECK
              value: "true"
            - name: ENABLE_ACCEL
              value: "false"

          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: false

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"

          readinessProbe:
            httpGet:
              path: /health
              port: 19000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 36          # 容忍 6 分钟冷启动
          livenessProbe:
            httpGet:
              path: /health
              port: 19000
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5

        # ============================================================
        # 引擎容器（vLLM）
        # GPU 访问：privileged + hostPath nvidia-libs + LD_LIBRARY_PATH
        # 等待 start_command.sh 后直接执行（无 Ray 协调）
        # ============================================================
        - name: engine
          image: vllm/vllm-openai:v0.13.0
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true

          command: ["/bin/sh", "-c"]
          args:
            - |
              export LD_LIBRARY_PATH=/usr/lib/nvidia-host:${LD_LIBRARY_PATH:-}
              echo "[engine] DP mode - waiting for start_command.sh..."
              while [ ! -f /shared-volume/start_command.sh ]; do
                sleep 2
              done
              echo "[engine] start_command.sh found:"
              cat /shared-volume/start_command.sh
              echo "[engine] Executing..."
              cd /shared-volume
              bash start_command.sh

          env:
            # CUDA_VISIBLE_DEVICES=1 → 选择 .148 的 L20（idx=1）
            # vLLM 内部映射为 cuda:0，实际硬件为 /dev/nvidia1
            - name: CUDA_VISIBLE_DEVICES
              value: "1"
            - name: CUDA_DEVICE_ORDER
              value: "PCI_BUS_ID"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"

          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
            - name: nvidia-libs
              mountPath: /usr/lib/nvidia-host
            # 设备节点挂载
            - name: dev-nvidia0
              mountPath: /dev/nvidia0
            - name: dev-nvidia1
              mountPath: /dev/nvidia1
            - name: dev-nvidiactl
              mountPath: /dev/nvidiactl
            - name: dev-nvidia-uvm
              mountPath: /dev/nvidia-uvm
            - name: dev-nvidia-uvm-tools
              mountPath: /dev/nvidia-uvm-tools
            - name: dev-nvidia-modeset
              mountPath: /dev/nvidia-modeset

          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
            limits:
              cpu: "16"
              memory: "48Gi"
