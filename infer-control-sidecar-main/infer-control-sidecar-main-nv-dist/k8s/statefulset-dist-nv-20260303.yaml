# statefulset-dist-nv-20260303.yaml
# 用途：NV 分布式验证 StatefulSet（方案 A）
# 日期：2026-03-03
# 目标：7.6.52.148（rank-0/infer-0）+ 7.6.16.150（rank-1/infer-1）
# 部署环境：k3s-dist-zhanghui 容器内（不影响物理机现有服务）
# namespace：wings-verify-dist
#
# 说明：
#   - PodAntiAffinity 强制两个 Pod 调度到不同物理节点
#   - NODE_RANK 通过 DownwardAPI 注入（Pod 序号 = rank）
#   - HEAD_NODE_ADDR 固定为 infer-0.infer-hl 的 DNS
#   - GPU 访问：privileged + hostPath(nvidia-libs) + LD_LIBRARY_PATH
#     （参考 infer-control-sidecar-k8s-gpu-deploy_20260228.md Step 3）
#   - 切换引擎：修改 ENGINE 和 DISTRIBUTED_EXECUTOR_BACKEND 后 rollout restart
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: infer
  namespace: wings-verify-dist
  labels:
    app: infer-dist
    owner: zhanghui
    version: "20260303"
spec:
  serviceName: infer-hl
  replicas: 2
  selector:
    matchLabels:
      app: infer-dist
  template:
    metadata:
      labels:
        app: infer-dist
        owner: zhanghui
    spec:
      # 强制两个 Pod 调度到不同节点（一个 L20 per Pod）
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: infer-dist
              topologyKey: kubernetes.io/hostname

      volumes:
        - name: shared-volume
          emptyDir: {}
        - name: model-volume
          hostPath:
            path: /mnt/models          # 物理机模型路径，两台机器须一致
            type: DirectoryOrCreate
        - name: nvidia-libs
          hostPath:
            path: /mnt/nvidia-libs     # Step-准备：docker cp libnvidia-ml / libcuda 到 k3s 容器内
            type: Directory

      containers:
        # ============================================================
        # wings-infer 控制容器
        # rank-0：生成 head/rank-0 脚本，启动 proxy(18000) + health(19000)
        # rank-1：生成 worker 脚本，不启动 proxy
        # ============================================================
        - name: wings-infer
          image: wings-infer:dist-nv-dev-zhanghui
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18000
              name: proxy
            - containerPort: 19000
              name: health
          env:
            # ---- 分布式参数 ----
            - name: DISTRIBUTED
              value: "true"
            - name: NNODES
              value: "2"
            - name: NODE_RANK
              valueFrom:
                fieldRef:
                  # StatefulSet Pod 序号（infer-0 → 0，infer-1 → 1）
                  fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
            - name: HEAD_NODE_ADDR
              value: "infer-0.infer-hl.wings-verify-dist.svc.cluster.local"

            # ---- 引擎配置（通过 rollout restart 切换引擎）----
            # vLLM Ray:  ENGINE=vllm  DISTRIBUTED_EXECUTOR_BACKEND=ray
            # vLLM DP:   ENGINE=vllm  DISTRIBUTED_EXECUTOR_BACKEND=dp_deployment
            # SGLang:    ENGINE=sglang DISTRIBUTED_EXECUTOR_BACKEND=（留空）
            - name: ENGINE
              value: "vllm"
            - name: DISTRIBUTED_EXECUTOR_BACKEND
              value: "ray"

            # ---- 模型配置 ----
            - name: MODEL_NAME
              value: "DeepSeek-R1-Distill-Qwen-1.5B"
            - name: MODEL_PATH
              value: "/models/DeepSeek-R1-Distill-Qwen-1.5B"
            - name: TP_SIZE
              value: "1"
            - name: MAX_MODEL_LEN
              value: "2048"

            # ---- 端口规划 ----
            - name: ENGINE_PORT
              value: "17000"
            - name: PORT
              value: "18000"
            - name: HEALTH_PORT
              value: "19000"

            # ---- K8s sidecar 模式 ----
            - name: WINGS_SKIP_PID_CHECK
              value: "true"
            - name: ENABLE_ACCEL
              value: "false"

          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"

          readinessProbe:
            httpGet:
              path: /health
              port: 19000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 36         # 容忍 6 分钟冷启动
          livenessProbe:
            httpGet:
              path: /health
              port: 19000
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5

        # ============================================================
        # 引擎容器（vLLM / SGLang）
        # GPU 访问：privileged + hostPath nvidia-libs + LD_LIBRARY_PATH
        # ============================================================
        - name: engine
          # 切换引擎时替换此镜像：
          #   vLLM:   vllm/vllm-openai:v0.8.0
          #   SGLang: lmsysorg/sglang:latest
          image: vllm/vllm-openai:v0.13.0
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true             # 打通 /dev/nvidia* 设备访问

          command: ["/bin/sh", "-c"]
          args:
            - |
              # 追加宿主机驱动库路径（libnvidia-ml / libcuda）
              export LD_LIBRARY_PATH=/usr/lib/nvidia-host:${LD_LIBRARY_PATH:-}
              echo "[engine] LD_LIBRARY_PATH=$LD_LIBRARY_PATH"

              echo "[engine] Waiting for start_command.sh..."
              while [ ! -f /shared-volume/start_command.sh ]; do
                sleep 2
              done

              echo "[engine] start_command.sh found:"
              cat /shared-volume/start_command.sh

              echo "[engine] Executing..."
              cd /shared-volume
              bash start_command.sh

          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"

          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
            - name: nvidia-libs
              mountPath: /usr/lib/nvidia-host   # LD_LIBRARY_PATH 指向此路径

          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
            limits:
              cpu: "16"
              memory: "48Gi"
              # nvidia.com/gpu 不申请（k3s-dist-zhanghui 内无 device plugin）
              # GPU 访问通过 privileged + hostPath libs 实现
