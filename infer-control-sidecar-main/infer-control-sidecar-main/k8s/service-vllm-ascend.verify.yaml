# service-vllm-ascend.verify.yaml
# 用途：k3s-verify 验证环境 — vllm-ascend 引擎专用 Service（namespace=wings-verify）
# NodePort：31810→18000（proxy），31910→19000（health）
# 注意：端口与 sglang service（31800/31900）错开，可共存
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: wings-infer-vllm-ascend-service
  namespace: wings-verify
  labels:
    app: wings-infer-vllm-ascend
spec:
  type: NodePort
  ports:
    - port: 18000
      targetPort: 18000
      nodePort: 31810
      protocol: TCP
      name: proxy
    - port: 19000
      targetPort: 19000
      nodePort: 31910
      protocol: TCP
      name: health
  selector:
    app: wings-infer-vllm-ascend
