# service.verify.yaml
# 用途：无 GPU 验证环境专用 Service（namespace=wings-verify）
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: wings-infer-service
  namespace: wings-verify
  labels:
    app: wings-infer
spec:
  type: ClusterIP
  ports:
    - port: 18000
      targetPort: 18000
      protocol: TCP
      name: proxy
    - port: 19000
      targetPort: 19000
      protocol: TCP
      name: health
  selector:
    app: wings-infer
