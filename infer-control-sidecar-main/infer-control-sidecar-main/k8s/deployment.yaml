apiVersion: apps/v1
kind: Deployment
metadata:
  name: wings-infer
  labels:
    app: wings-infer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wings-infer
  template:
    metadata:
      labels:
        app: wings-infer
    spec:
      # ---- 共享卷配置 ----
      volumes:
        - name: shared-volume
          emptyDir: {}                    # 控制层写命令、执行层读命令的交互通道
        - name: model-volume
          hostPath:
            path: /mnt/models             # 修改为实际模型存储路径
            type: DirectoryOrCreate
        - name: accel-volume
          emptyDir: {}                    # accel 初始化容器产物

      # ---- 初始化容器：拷贝 accel 文件 ----
      initContainers:
        - name: accel-init
          image: wings-accel:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Copying accel files to shared volume..."
              cp -r /accel/* /accel-volume/
              echo "Accel files copied successfully"
          volumeMounts:
            - name: accel-volume
              mountPath: /accel-volume

      containers:
        # ============================================================
        # Wings-Infer 控制容器（新版 launcher 模式）
        # 职责：解析参数 → 写共享卷命令 → 启动 proxy/health 子进程
        # 端口规划：
        #   17000 - 引擎后端（由 vllm-engine 容器监听）
        #   18000 - 业务代理 proxy（对外暴露）
        #   19000 - 健康探针 health（K8s 探针入口）
        # ============================================================
        - name: wings-infer
          image: wings-infer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18000
              name: proxy               # 业务代理端口
            - containerPort: 19000
              name: health               # 健康探针端口
          env:
            # ---- 引擎配置 ----
            - name: ENGINE_TYPE
              value: "vllm"
            - name: ENGINE_PORT          # 引擎后端监听端口，与 vllm-engine 容器一致
              value: "17000"
            # ---- 新版端口规划 ----
            - name: PORT                 # proxy 对外端口
              value: "18000"
            - name: HEALTH_PORT          # health 探针端口
              value: "19000"
            - name: WINGS_PORT           # 保留兼容字段
              value: "18000"
            # ---- 模型配置 ----
            - name: MODEL_NAME
              value: "DeepSeek-R1-Distill-Qwen-1.5B"
            - name: MODEL_PATH
              value: "/models/DeepSeek-R1-Distill-Qwen-1.5B"
            - name: TP_SIZE
              value: "1"
            - name: MAX_MODEL_LEN
              value: "8192"
            # ---- 网络信息 ----
            - name: SERVICE_CLUSTER_IP
              value: "10.255.128.184"
            - name: NODE_PORT
              value: "30483"
            - name: NODE_IP
              value: "90.90.161.168"
            # ---- 加速开关 ----
            - name: ENABLE_ACCEL
              value: "true"
            # ---- K8s sidecar 模式：引擎为独立容器，跳过 PID 文件检查 ----
            - name: WINGS_SKIP_PID_CHECK
              value: "true"
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: false
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          # 探针统一指向 health 服务（19000）
          readinessProbe:
            httpGet:
              path: /health
              port: 19000
            initialDelaySeconds: 30       # 引擎加载模型需要时间，放宽初始延迟
            periodSeconds: 10
            failureThreshold: 30          # 大模型冷启动容忍 5 分钟
          livenessProbe:
            httpGet:
              path: /health
              port: 19000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5

        # ============================================================
        # 引擎容器 (vLLM)
        # 职责：监听共享卷命令 → 拉起 vLLM → 在 17000 提供推理服务
        # ============================================================
        - name: vllm-engine
          image: vllm/vllm-openai:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              # 等待 wings-infer 写入启动命令
              echo "Waiting for start command..."
              while [ ! -f /shared-volume/start_command.sh ]; do
                sleep 1
              done

              # 检查是否启用加速
              if [ "$ENABLE_ACCEL" = "true" ]; then
                echo "Accel is enabled, installing accel packages..."
                cd /accel-volume
                bash install.sh
                echo "Accel packages installed successfully"
              else
                echo "Accel is disabled, skipping installation"
              fi

              # 读取并执行启动命令（后台运行）
              echo "Start command found, executing..."
              cd /shared-volume
              bash start_command.sh &
              ENGINE_PID=$!

              # 等待引擎启动（监听 17000 端口）
              echo "Waiting for engine to start on port 17000..."
              while ! nc -z 127.0.0.1 17000 2>/dev/null; do
                sleep 2
              done
              echo "Engine is listening on port 17000"

              # 等待引擎进程退出（比 tail -f 更可靠）
              echo "Engine started successfully, monitoring PID=$ENGINE_PID"
              wait $ENGINE_PID
              EXIT_CODE=$?
              echo "Engine exited with code $EXIT_CODE"
              exit $EXIT_CODE
          env:
            - name: ENABLE_ACCEL
              value: "true"
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: false
            - name: accel-volume
              mountPath: /accel-volume
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: "32Gi"
              nvidia.com/gpu: "1"
