# service-mindie.verify.yaml
# 用途：k3s-verify 验证环境 — MindIE 引擎专用 Service（namespace=wings-verify）
# NodePort：31820→18000（proxy），31920→19000（health）
# 注意：端口与 vllm-ascend（31810/31910）和 sglang（31800/31900）不冲突，可共存
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: wings-infer-mindie-service
  namespace: wings-verify
  labels:
    app: wings-infer-mindie
spec:
  type: NodePort
  ports:
    - port: 18000
      targetPort: 18000
      nodePort: 31820
      protocol: TCP
      name: proxy
    - port: 19000
      targetPort: 19000
      nodePort: 31920
      protocol: TCP
      name: health
  selector:
    app: wings-infer-mindie
