# deployment.verify.yaml
# 用途：verify 验证环境（k3s-verify in Docker）专用部署清单
# 核心差异（vs deployment.yaml）：
#   1. namespace = wings-verify（隔离，不影响现网）
#   2. runtimeClassName: nvidia — 使用 nvidia-container-runtime，正确注入 NVML/CUDA 驱动库
#      （宿主机 nvidia RuntimeClass 已存在，无需额外安装）
#   3. 去掉 nvidia.com/gpu 资源请求 — verify 集群无 NVIDIA device plugin，
#      GPU 访问通过 runtimeClassName 实现；Pod 可正常调度
#   4. ENABLE_ACCEL=false，跳过 accel 安装
#   5. 镜像使用 verify-latest tag（由构建脚本统一打该 tag）
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wings-infer
  namespace: wings-verify
  labels:
    app: wings-infer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wings-infer
  template:
    metadata:
      labels:
        app: wings-infer
    spec:
      # GPU 访问方案：privileged + hostPath 挂载驱动库
      # k3s-verify 基于 Alpine musl，nvidia-container-runtime（glibc）无法运行于其中。
      # 替代方案：
      #   1. 将宿主机 libnvidia-ml.so / libcuda.so 复制进 k3s-verify 的 /mnt/nvidia-libs/
      #   2. vllm-engine 用 hostPath 卷挂载该目录并追加 LD_LIBRARY_PATH
      #   3. securityContext.privileged=true 打通 /dev/nvidia* 设备访问

      volumes:
        - name: shared-volume
          emptyDir: {}
        - name: model-volume
          hostPath:
            path: /mnt/models
            type: DirectoryOrCreate
        - name: accel-volume
          emptyDir: {}
        - name: nvidia-libs
          hostPath:
            path: /mnt/nvidia-libs   # k3s-verify 内的驱动库目录
            type: Directory

      initContainers:
        - name: accel-init
          image: wings-accel:verify-latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Copying accel files to shared volume..."
              cp -r /accel/* /accel-volume/
              echo "Accel files copied successfully"
          volumeMounts:
            - name: accel-volume
              mountPath: /accel-volume

      containers:
        # ============================================================
        # Wings-Infer 控制容器
        # 端口：17000=引擎后端  18000=proxy(对外)  19000=health(探针)
        # ============================================================
        - name: wings-infer
          image: wings-infer:verify-latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18000
              name: proxy
            - containerPort: 19000
              name: health
          env:
            # ---- 引擎配置 ----
            - name: ENGINE_TYPE
              value: "vllm"
            - name: ENGINE_PORT
              value: "17000"
            # ---- 端口规划 ----
            - name: PORT
              value: "18000"
            - name: HEALTH_PORT
              value: "19000"
            - name: WINGS_PORT
              value: "18000"
            # ---- 模型配置 ----
            - name: MODEL_NAME
              value: "DeepSeek-R1-Distill-Qwen-1.5B"
            - name: MODEL_PATH
              value: "/models/DeepSeek-R1-Distill-Qwen-1.5B"
            - name: TP_SIZE
              value: "1"
            - name: MAX_MODEL_LEN
              value: "2048"
            # ---- 加速关闭（verify 环境无 accel 镜像）----
            - name: ENABLE_ACCEL
              value: "false"
            # ---- K8s sidecar 模式：跳过 PID 文件检查 ----
            - name: WINGS_SKIP_PID_CHECK
              value: "true"
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: false
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 19000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30          # GPU 冷启动容忍 5 分钟
          livenessProbe:
            httpGet:
              path: /health
              port: 19000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5

        # ============================================================
        # 引擎容器 (vLLM) - GPU 模式
        # 通过 privileged + hostPath(nvidia-libs) 访问 GPU，
        # 不依赖 nvidia-container-runtime（因 k3s-verify 为 Alpine musl 容器）
        # ============================================================
        - name: vllm-engine
          image: vllm/vllm-openai:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true      # 打通 /dev/nvidia* 设备访问
          command: ["/bin/sh", "-c"]
          args:
            - |
              # 追加宿主机驱动库路径（libnvidia-ml / libcuda）
              export LD_LIBRARY_PATH=/usr/lib/nvidia-host:${LD_LIBRARY_PATH:-}

              echo "Waiting for start command..."
              while [ ! -f /shared-volume/start_command.sh ]; do
                sleep 1
              done

              echo "Accel disabled (verify mode), skipping installation"

              echo "Start command found, executing..."
              cd /shared-volume
              bash start_command.sh &
              ENGINE_PID=$!

              echo "Waiting for engine to start on port 17000..."
              while ! nc -z 127.0.0.1 17000 2>/dev/null; do
                sleep 2
              done
              echo "Engine is listening on port 17000"

              echo "Engine started successfully, monitoring PID=$ENGINE_PID"
              wait $ENGINE_PID
              EXIT_CODE=$?
              echo "Engine exited with code $EXIT_CODE"
              exit $EXIT_CODE
          env:
            - name: ENABLE_ACCEL
              value: "false"
            # NVIDIA_VISIBLE_DEVICES / CAPABILITIES 帮助部分 CUDA 版本自动检测设备
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: false
            - name: accel-volume
              mountPath: /accel-volume
            - name: nvidia-libs
              mountPath: /usr/lib/nvidia-host  # LD_LIBRARY_PATH 追加此路径
          resources:
            # verify 集群无 nvidia.com/gpu device plugin，不申请 GPU 资源
            # 通过 privileged + hostPath libs 直接访问 GPU 设备
            requests:
              cpu: "2"
              memory: "8Gi"
            limits:
              cpu: "8"
              memory: "32Gi"
