# service-sglang.verify.yaml
# 用途：verify 验证环境 SGLang 专用 Service（namespace=wings-verify）
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: wings-infer-sglang-service
  namespace: wings-verify
  labels:
    app: wings-infer-sglang
spec:
  type: NodePort
  ports:
    - port: 18000
      targetPort: 18000
      nodePort: 31800
      protocol: TCP
      name: proxy
    - port: 19000
      targetPort: 19000
      nodePort: 31900
      protocol: TCP
      name: health
  selector:
    app: wings-infer-sglang
