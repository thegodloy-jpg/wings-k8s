# deployment-mindie.verify.yaml
# 用途：k3s-verify 验证环境 — MindIE 引擎（昇腾 910B，MindIE 2.2.RC1）
# 核心特点：
#   1. ENGINE=mindie，wings-infer 生成含 config.json + daemon 启动的 start_command.sh
#   2. wings-infer 镜像：wings-infer:zhanghui-ascend-st（同 vllm-ascend 验证）
#   3. 引擎镜像：swr.cn-south-1.myhuaweicloud.com/ascendhub/mindie:2.2.RC1-800I-A2-py311-openeuler24.03-lts
#   4. NPU 使用 NPU 0（k3s 嵌套环境中无法通过 env var 切换，同 vllm-ascend 情形）
#   5. privileged 模式访问 /dev/davinci*，ascend driver 通过 hostPath 挂载
#   6. Service NodePort: 31820→18000(proxy), 31920→19000(health)（区别 vllm-ascend 的 31810/31910）
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wings-infer-mindie
  namespace: wings-verify
  labels:
    app: wings-infer-mindie
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wings-infer-mindie
  template:
    metadata:
      labels:
        app: wings-infer-mindie
    spec:
      # 验证环境磁盘使用率较高（>97%），添加容忍以允许调度
      tolerations:
        - key: "node.kubernetes.io/disk-pressure"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node.kubernetes.io/memory-pressure"
          operator: "Exists"
          effect: "NoSchedule"
      volumes:
        - name: shared-volume
          emptyDir: {}
        - name: model-volume
          hostPath:
            path: /mnt/cephfs/models
            type: DirectoryOrCreate
        # ascend driver 库（hostPath Directory，k3s 嵌套环境可用）
        # MindIE 2.2.RC1 内置 CANN 8.3，但需要 host driver 库访问物理 NPU
        - name: ascend-driver
          hostPath:
            path: /usr/local/Ascend/driver
            type: Directory
        # npu-smi 工具（MindIE atb-models 在 init_ascend_weight 时调用 npu-smi info -t topo）
        - name: npu-smi
          hostPath:
            path: /usr/local/sbin/npu-smi
            type: File
        # /dev/shm 放大（默认 64MB 不足，PyTorch 多进程共享内存 → SIGKILL）
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi

      containers:
        # ============================================================
        # Wings-Infer 控制容器（Ascend ST 版本）
        # 负责：生成 start_command.sh（写入 config.json + 启动 MindIE daemon）
        # 端口：18000=proxy(对外推理接口)  19000=health(健康探针)
        # ============================================================
        - name: wings-infer
          image: wings-infer:zhanghui-ascend-st
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18000
              name: proxy
            - containerPort: 19000
              name: health
          env:
            # ---- 引擎配置 ----
            - name: ENGINE
              value: "mindie"
            - name: ENGINE_PORT
              value: "17000"
            # ---- 端口规划 ----
            - name: PORT
              value: "18000"
            - name: HEALTH_PORT
              value: "19000"
            - name: WINGS_PORT
              value: "18000"
            # ---- 模型配置 ----
            - name: MODEL_NAME
              value: "DeepSeek-R1-Distill-Qwen-1.5B"
            - name: MODEL_PATH
              value: "/models/DeepSeek-R1-Distill-Qwen-1.5B"
            - name: DEVICE_COUNT
              value: "1"
            # ---- 推理参数 ----
            - name: INPUT_LENGTH
              value: "4096"
            - name: OUTPUT_LENGTH
              value: "1024"
            - name: MAX_MODEL_LEN
              value: "5120"
            - name: TRUST_REMOTE_CODE
              value: "true"
            # ---- 硬件声明 ----
            - name: WINGS_DEVICE
              value: "ascend"
            - name: DEVICE
              value: "ascend"
            # ---- K8s sidecar 模式 ----
            - name: ENABLE_ACCEL
              value: "false"
            - name: WINGS_SKIP_PID_CHECK
              value: "true"
            - name: SHARED_VOLUME_PATH
              value: "/shared-volume"
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 19000
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 60       # MindIE 冷启动较慢，容忍最长 15 分钟
          livenessProbe:
            httpGet:
              path: /health
              port: 19000
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 5

        # ============================================================
        # MindIE 引擎容器（2.2.RC1）
        # 镜像: swr.cn-south-1.myhuaweicloud.com/ascendhub/mindie:2.2.RC1-800I-A2-py311-openeuler24.03-lts
        # 内置 CANN 8.3 + MindIE service/llm，无需挂载 ascend-toolkit
        # NPU 0 被使用（k3s 嵌套环境中无法通过 env var 切换 NPU，同 vllm-ascend）
        # Port: 17000 (ServerConfig.port) ← wings-infer 的 ENGINE_PORT
        # ============================================================
        - name: mindie-engine
          image: swr.cn-south-1.myhuaweicloud.com/ascendhub/mindie:2.2.RC1-800I-A2-py311-openeuler24.03-lts
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true      # 打通 /dev/davinci* 设备访问
          command: ["/bin/bash", "-c"]
          args:
            - |
              # ── MindIE 2.2.RC1 启动脚本（简化版）──────────────────────────
              # start_command.sh 已由 wings-infer 的 mindie_adapter.py（merge-update 策略）生成：
              #   1. 写入 _mindie_overrides.json（仅需覆盖的字段）
              #   2. 内联 Python 读取镜像原始 config.json → merge 覆盖 → 写回
              #   3. exec mindieservice_daemon（daemon 成为容器主进程）
              # 这里仅需：等待 → 打印诊断 → source env → exec start_command.sh
              echo "=== MindIE 2.2.RC1 engine container starting ==="
              echo "=== CANN内置版本 ==="
              ls /usr/local/Ascend/ascend-toolkit/ 2>&1 | head -5
              echo "=== MindIE版本 ==="
              cat /usr/local/Ascend/mindie/latest/version.info 2>/dev/null || echo "version.info not found"
              echo "=== Device files ==="
              ls /dev/davinci* /dev/davinci_manager 2>&1 | head -8

              echo "=== Waiting for start_command.sh from wings-infer... ==="
              while [ ! -f /shared-volume/start_command.sh ]; do
                sleep 2
              done

              echo "=== start_command.sh found, content: ==="
              cat /shared-volume/start_command.sh

              echo "=== Sourcing MindIE environment (libtorch.so + libatb.so etc.) ==="
              set +e
              source /usr/local/Ascend/mindie/set_env.sh > /tmp/mindie_setenv.log 2>&1 || echo "WARN: set_env.sh exited non-zero"
              grep -v 'mindie-sd\|aie_ops\|UserWarning\|libc10_cuda' /tmp/mindie_setenv.log || true
              set -e
              echo "=== MindIE env sourced, LD_LIBRARY_PATH length=$(echo $LD_LIBRARY_PATH | wc -c) ==="

              # ── 执行 start_command.sh → merge-update config → patch 内存参数 → 启动 daemon ──
              echo "=== Executing start_command.sh (merge-update + exec daemon) ==="
              # 1. 先执行 start_command.sh 中的 merge-update 部分
              #    去掉 exec daemon 行，只做 config 合并
              sed -i '/^exec \.\/bin\/mindieservice_daemon/d' /shared-volume/start_command.sh
              sed -i '/^\.\/bin\/mindieservice_daemon/d' /shared-volume/start_command.sh
              bash /shared-volume/start_command.sh 2>&1 || true

              # 2. Post-merge patch: 降低内存预分配参数（OOM 修复）
              #    默认 maxBatchSize=256 + tokenizerProcessNumber=8 导致 >64GB 内存分配
              CONFIG_FILE='/usr/local/Ascend/mindie/latest/mindie-service/conf/config.json'
              echo "=== Post-merge: reducing memory-intensive params ==="
              python3 -c 'import json,os;CF="/usr/local/Ascend/mindie/latest/mindie-service/conf/config.json";c=json.load(open(CF));c["BackendConfig"]["tokenizerProcessNumber"]=2;c["BackendConfig"]["ScheduleConfig"]["maxBatchSize"]=32;c["BackendConfig"]["ScheduleConfig"]["maxPrefillBatchSize"]=8;c["BackendConfig"]["ScheduleConfig"]["cacheBlockSize"]=128;json.dump(c,open(CF,"w"),indent=2,ensure_ascii=False);os.chmod(CF,0o640);print("Patched: tokenizerProcessNumber=2 maxBatchSize=32 cacheBlockSize=128")'
              echo "=== config.json final head: ==="
              head -50 "$CONFIG_FILE"

              # 3. 启动 daemon（调试模式：捕获退出码和日志文件）
              echo "=== Starting MindIE daemon ==="
              cd '/usr/local/Ascend/mindie/latest/mindie-service'
              ./bin/mindieservice_daemon 2>&1; RET=$?
              echo "=== DAEMON EXITED WITH CODE: $RET ==="
              echo "=== /dev/shm usage ==="
              df -h /dev/shm
              echo "=== Log files ==="
              find /usr/local/Ascend/ -name '*.log' -newer /proc/1/stat 2>/dev/null | head -30
              for logf in $(find /usr/local/Ascend/ -name '*.log' -newer /proc/1/stat 2>/dev/null | head -5); do echo "=== $logf ==="; tail -50 "$logf"; done
              echo "=== Sleeping for debug ==="
              sleep 86400
          env:
            # MindIE 内置 CANN 8.3，ASCEND_TOOLKIT_HOME 已由镜像 ENV 设置
            # vllm-ascend 已停止，NPU 0 全量可用，config.json npuDeviceIds=[[0]] 直接使用
            # 强制所有日志输出到 stdout 以便诊断
            - name: MINDIE_LOG_TO_STDOUT
              value: "1"
            - name: MINDIE_LOG_LEVEL
              value: "INFO"
            - name: MINDIE_LOG_TO_FILE
              value: "0"
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
            # Ascend NPU driver 库（hostPath Directory）
            # MindIE 内置 CANN toolkit，仅需 driver 库访问物理 NPU
            - name: ascend-driver
              mountPath: /usr/local/Ascend/driver
              readOnly: true
            # npu-smi 工具（atb-models init_ascend_weight → npu-smi info -t topo）
            - name: npu-smi
              mountPath: /usr/local/sbin/npu-smi
              readOnly: true
            # /dev/shm 扩容（PyTorch 多进程共享内存）
            - name: dshm
              mountPath: /dev/shm
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
            limits:
              cpu: "16"
              memory: "128Gi"
