# deployment-sglang.verify.yaml
# 用途：verify 验证环境（k3s-verify in Docker）专用 — SGLang 引擎验证
# 核心差异（vs deployment.verify.yaml）：
#   1. ENGINE_TYPE = sglang
#   2. 引擎容器从 vllm/vllm-openai 换为 sglang-infer:zhanghui-20260228
#   3. wings-infer 使用新构建的 wings-infer:zhanghui-20260228（含 sglang_adapter）
#   4. GPU：A100 (nvidia0)，通过 privileged + hostPath(nvidia-libs) 访问
#      （k3s-verify 为 Alpine musl 容器，不支持 nvidia-container-runtime）
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wings-infer-sglang
  namespace: wings-verify
  labels:
    app: wings-infer-sglang
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wings-infer-sglang
  template:
    metadata:
      labels:
        app: wings-infer-sglang
    spec:
      volumes:
        - name: shared-volume
          emptyDir: {}
        - name: model-volume
          hostPath:
            path: /mnt/models
            type: DirectoryOrCreate
        - name: nvidia-libs
          hostPath:
            path: /mnt/nvidia-libs   # k3s-verify 内的驱动库目录（宿主机驱动 so 文件）
            type: Directory

      containers:
        # ============================================================
        # Wings-Infer 控制容器（新构建，含 sglang_adapter）
        # 端口：17000=引擎后端  18000=proxy(对外)  19000=health(探针)
        # ============================================================
        - name: wings-infer
          image: wings-infer:zhanghui-20260228
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18000
              name: proxy
            - containerPort: 19000
              name: health
          env:
            # ---- 引擎配置 ----
            - name: ENGINE
              value: "sglang"
            - name: ENGINE_PORT
              value: "17000"
            # ---- 端口规划 ----
            - name: PORT
              value: "18000"
            - name: HEALTH_PORT
              value: "19000"
            - name: WINGS_PORT
              value: "18000"
            # ---- 模型配置 ----
            - name: MODEL_NAME
              value: "DeepSeek-R1-Distill-Qwen-1.5B"
            - name: MODEL_PATH
              value: "/models/DeepSeek-R1-Distill-Qwen-1.5B"
            - name: TP_SIZE
              value: "1"
            - name: MAX_MODEL_LEN
              value: "2048"
            # ---- 加速关闭（verify 环境）----
            - name: ENABLE_ACCEL
              value: "false"
            # ---- K8s sidecar 模式：跳过 PID 文件检查 ----
            - name: WINGS_SKIP_PID_CHECK
              value: "true"
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: false
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 19000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 36          # GPU 冷启动容忍 6 分钟
          livenessProbe:
            httpGet:
              path: /health
              port: 19000
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5

        # ============================================================
        # 引擎容器 (SGLang) - GPU 模式
        # 通过 privileged + hostPath(nvidia-libs) 访问 A100 GPU，
        # 不依赖 nvidia-container-runtime（k3s-verify 为 Alpine musl）
        # ============================================================
        - name: sglang-engine
          image: sglang-infer:zhanghui-20260228
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true      # 打通 /dev/nvidia* 设备访问
          command: ["/bin/sh", "-c"]
          args:
            - |
              # 追加宿主机驱动库路径（libnvidia-ml / libcuda / nvidia-smi）
              export LD_LIBRARY_PATH=/usr/lib/nvidia-host:${LD_LIBRARY_PATH:-}
              export PATH=/usr/lib/nvidia-host:${PATH}

              # 用 UUID 精确锁定 A100，避免容器内设备顺序与宿主机不同导致选错卡
              # A100 UUID: GPU-3ad4c258-3338-a49d-b6db-5059e89d9811 (40GiB)
              # L20  UUID: GPU-715b6a2e-d331-6e21-ac7b-40d382d6bf04 (46GiB) <- 禁止使用
              export CUDA_DEVICE_ORDER=PCI_BUS_ID
              export CUDA_VISIBLE_DEVICES=GPU-3ad4c258-3338-a49d-b6db-5059e89d9811

              echo "nvidia-smi path: $(which nvidia-smi 2>/dev/null || echo NOT_FOUND)"
              nvidia-smi -L 2>&1 || true
              echo "CUDA_VISIBLE_DEVICES=$CUDA_VISIBLE_DEVICES"

              echo "Waiting for start command from wings-infer..."
              while [ ! -f /shared-volume/start_command.sh ]; do
                sleep 1
              done

              echo "Start command found:"
              cat /shared-volume/start_command.sh

              echo "Executing sglang start command..."
              cd /shared-volume
              bash start_command.sh &
              ENGINE_PID=$!

              echo "Waiting for sglang engine to start on port 17000..."
              while ! nc -z 127.0.0.1 17000 2>/dev/null; do
                sleep 2
                # 检查进程是否存活
                if ! kill -0 $ENGINE_PID 2>/dev/null; then
                  echo "ERROR: sglang engine process died unexpectedly"
                  exit 1
                fi
              done
              echo "SGLang engine is listening on port 17000"

              echo "Engine started successfully, monitoring PID=$ENGINE_PID"
              wait $ENGINE_PID
              EXIT_CODE=$?
              echo "Engine exited with code $EXIT_CODE"
              exit $EXIT_CODE
          env:
            - name: ENABLE_ACCEL
              value: "false"
            # 用 UUID 精确锁定 A100-PCIE-40GB，绝不使用 L20
            - name: CUDA_DEVICE_ORDER
              value: "PCI_BUS_ID"
            - name: CUDA_VISIBLE_DEVICES
              value: "GPU-3ad4c258-3338-a49d-b6db-5059e89d9811"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "GPU-3ad4c258-3338-a49d-b6db-5059e89d9811"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"
            # SGLang 禁用 triton 自动缓存（verify 容器无持久化存储）
            - name: TRITON_CACHE_DIR
              value: "/tmp/triton_cache"
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: false
            - name: nvidia-libs
              mountPath: /usr/lib/nvidia-host  # LD_LIBRARY_PATH 追加此路径
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
            limits:
              cpu: "8"
              memory: "40Gi"
