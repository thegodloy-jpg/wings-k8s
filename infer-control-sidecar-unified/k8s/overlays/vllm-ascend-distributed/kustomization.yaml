# vllm-ascend-distributed overlay
# 用途: vLLM-Ascend + Ray 跨节点分布式推理 (Ascend 910B NPU)
# 用法: kubectl apply -k k8s/overlays/vllm-ascend-distributed
#
# 部署前必须修改:
#   1. HEAD_NODE_ADDR → rank-0 节点真实 IP
#   2. NODE_IPS → 所有节点 IP (逗号分隔)
#   3. BACKEND_URL → http://127.0.0.1:<ENGINE_PORT>
#   4. engine 镜像 → 实际的 vllm-ascend 镜像
#   5. model 路径 → 实际模型存储路径
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - service.yaml
  - statefulset.yaml

namespace: wings-infer

commonLabels:
  app.kubernetes.io/name: infer-vllm-ascend
  app.kubernetes.io/component: distributed
