# vllm-ascend distributed deployment - customized for .110/.170 ST test
# Namespace + Headless Service + ClusterIP Service + StatefulSet
---
apiVersion: v1
kind: Namespace
metadata:
  name: wings-infer

---
apiVersion: v1
kind: Service
metadata:
  name: infer-hl
  namespace: wings-infer
  labels:
    app.kubernetes.io/name: infer-vllm-ascend
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: infer-vllm-ascend
  ports:
    - name: ray-gcs
      port: 28020
      targetPort: 28020
    - name: engine
      port: 17000
      targetPort: 17000
    - name: proxy
      port: 18000
      targetPort: 18000
    - name: health
      port: 19000
      targetPort: 19000

---
apiVersion: v1
kind: Service
metadata:
  name: infer-api
  namespace: wings-infer
  labels:
    app.kubernetes.io/name: infer-vllm-ascend
spec:
  selector:
    app.kubernetes.io/name: infer-vllm-ascend
    statefulset.kubernetes.io/pod-name: infer-0
  ports:
    - name: proxy
      port: 18000
      targetPort: 18000
    - name: health
      port: 19000
      targetPort: 19000

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: infer
  namespace: wings-infer
spec:
  serviceName: infer-hl
  replicas: 2
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: infer-vllm-ascend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infer-vllm-ascend
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: infer-vllm-ascend
              topologyKey: kubernetes.io/hostname

      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule

      volumes:
        - name: shared-volume
          emptyDir: {}
        - name: model-volume
          hostPath:
            path: /mnt/cephfs/models
            type: DirectoryOrCreate
        - name: davinci0
          hostPath:
            path: /dev/davinci0
            type: CharDevice
        - name: davinci-manager
          hostPath:
            path: /dev/davinci_manager
            type: CharDevice
        - name: hisi-hdc
          hostPath:
            path: /dev/hisi_hdc
        - name: ascend-driver
          hostPath:
            path: /usr/local/Ascend/driver/lib64/driver
            type: DirectoryOrCreate
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi

      containers:
        # ---------- wings-infer sidecar ----------
        - name: wings-infer
          image: wings-infer:zhanghui-ascend-st-unified
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18000
              name: proxy
            - containerPort: 19000
              name: health
          env:
            - name: WINGS_DEVICE
              value: "ascend"
            - name: DEVICE
              value: "ascend"
            - name: DEVICE_COUNT
              value: "1"
            - name: DISTRIBUTED
              value: "true"
            - name: MASTER_IP
              value: "infer-0.infer-hl.wings-infer.svc.cluster.local"
            - name: RANK_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_IPS
              value: "infer-0.infer-hl.wings-infer.svc.cluster.local,infer-1.infer-hl.wings-infer.svc.cluster.local"
            - name: ENGINE
              value: "vllm_ascend"
            - name: DISTRIBUTED_EXECUTOR_BACKEND
              value: "ray"
            - name: TENSOR_PARALLEL_SIZE
              value: "1"
            - name: MODEL_NAME
              value: "DeepSeek-R1-Distill-Qwen-1.5B"
            - name: MODEL_PATH
              value: "/models/DeepSeek-R1-Distill-Qwen-1.5B"
            - name: ENGINE_PORT
              value: "17000"
            - name: PORT
              value: "18000"
            - name: HEALTH_PORT
              value: "19000"
            - name: WINGS_SKIP_PID_CHECK
              value: "true"
            - name: BACKEND_URL
              value: "http://127.0.0.1:17000"
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 19000
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 72
          livenessProbe:
            httpGet:
              path: /health
              port: 19000
            initialDelaySeconds: 240
            periodSeconds: 30
            failureThreshold: 5

        # ---------- vllm-ascend engine ----------
        - name: engine
          image: quay.io/ascend/vllm-ascend:v0.14.0rc1
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "[engine] Waiting for start_command.sh..."
              while [ ! -f /shared-volume/start_command.sh ]; do sleep 2; done
              echo "[engine] Executing..."
              cd /shared-volume && bash start_command.sh
          env:
            - name: ASCEND_VISIBLE_DEVICES
              value: "0"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
            - name: davinci0
              mountPath: /dev/davinci0
            - name: davinci-manager
              mountPath: /dev/davinci_manager
            - name: hisi-hdc
              mountPath: /dev/hisi_hdc
            - name: ascend-driver
              mountPath: /usr/local/Ascend/driver/lib64/driver
              readOnly: true
            - name: dshm
              mountPath: /dev/shm
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
            limits:
              cpu: "24"
              memory: "64Gi"
