# StatefulSet: MindIE 跨节点分布式推理 (Ascend NPU + HCCL)
# 分布式参数 (nnodes/node_rank/head_node_addr) 由 Master 自动计算注入
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: infer
spec:
  serviceName: infer-hl
  replicas: 2                              # CUSTOMIZE
  selector:
    matchLabels:
      app.kubernetes.io/name: infer-mindie
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infer-mindie
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: infer-mindie
              topologyKey: kubernetes.io/hostname
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule

      volumes:
        - name: shared-volume
          emptyDir: {}
        - name: model-volume
          hostPath:
            path: /mnt/cephfs/models                    # CUSTOMIZE
            type: DirectoryOrCreate
        - name: davinci0
          hostPath:
            path: /dev/davinci0
            type: CharDevice
        - name: davinci-manager
          hostPath:
            path: /dev/davinci_manager
            type: CharDevice
        - name: hisi-hdc
          hostPath:
            path: /dev/hisi_hdc
        - name: ascend-driver
          hostPath:
            path: /usr/local/Ascend/driver
            type: Directory
        - name: ascend-driver-lib
          hostPath:
            path: /usr/local/Ascend/driver/lib64
            type: Directory
        - name: hccn-conf
          hostPath:
            path: /etc/hccn.conf
            type: File
        - name: npu-smi
          hostPath:
            path: /usr/local/sbin/npu-smi
            type: File
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi

      containers:
        - name: wings-infer
          image: wings-infer:latest                      # CUSTOMIZE
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18000
            - containerPort: 19000
          env:
            - name: WINGS_DEVICE
              value: "ascend"
            - name: DEVICE
              value: "ascend"
            - name: DEVICE_COUNT
              value: "1"
            - name: DISTRIBUTED
              value: "true"
            - name: MASTER_IP
              value: "CHANGE_ME"                         # CUSTOMIZE: Master 节点 IP
            - name: RANK_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_IPS
              value: "CHANGE_ME,CHANGE_ME"               # CUSTOMIZE
            - name: ENGINE
              value: "mindie"
            - name: MODEL_NAME
              value: "DeepSeek-R1-Distill-Qwen-1.5B"     # CUSTOMIZE
            - name: MODEL_PATH
              value: "/models/DeepSeek-R1-Distill-Qwen-1.5B"
            - name: PORT
              value: "18000"
            - name: HEALTH_PORT
              value: "19000"
            - name: WINGS_SKIP_PID_CHECK
              value: "true"
            # ---- HCCL RoCE 设备 IP（用于分布式 rank table 的 device_ip 字段）----
            - name: HCCL_DEVICE_IPS
              value: "CHANGE_ME;CHANGE_ME"               # CUSTOMIZE: 各节点 RoCE 设备 IP，分号分隔
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits: { cpu: "2", memory: "4Gi" }
          readinessProbe:
            httpGet: { path: /health, port: 19000 }
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 54
          livenessProbe:
            httpGet: { path: /health, port: 19000 }
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 5

        - name: engine
          image: mindie:2.2.RC1                          # CUSTOMIZE
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "[engine] Waiting for start_command.sh..."
              while [ ! -f /shared-volume/start_command.sh ]; do sleep 2; done
              cd /shared-volume && bash start_command.sh
          env:
            - name: ASCEND_VISIBLE_DEVICES
              value: "0"
            - name: PATH
              value: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
            - name: davinci0
              mountPath: /dev/davinci0
            - name: davinci-manager
              mountPath: /dev/davinci_manager
            - name: hisi-hdc
              mountPath: /dev/hisi_hdc
            - name: ascend-driver
              mountPath: /usr/local/Ascend/driver
              readOnly: true
            - name: ascend-driver-lib
              mountPath: /usr/local/Ascend/driver/lib64
              readOnly: true
            - name: hccn-conf
              mountPath: /etc/hccn.conf
              readOnly: true
            - name: npu-smi
              mountPath: /usr/local/sbin/npu-smi
              readOnly: true
            - name: dshm
              mountPath: /dev/shm
          resources:
            requests: { cpu: "4", memory: "16Gi" }
            limits: { cpu: "24", memory: "64Gi" }
