# StatefulSet: SGLang 跨节点分布式推理 (NVIDIA GPU)
# 分布式参数 (nnodes/node_rank/head_node_addr) 由 Master 自动计算注入
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: infer
spec:
  serviceName: infer-hl
  replicas: 2                              # CUSTOMIZE
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: infer-sglang
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infer-sglang
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: infer-sglang
              topologyKey: kubernetes.io/hostname
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      volumes:
        - name: shared-volume
          emptyDir: {}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: model-volume
          hostPath:
            path: /mnt/models                           # CUSTOMIZE
            type: DirectoryOrCreate

      containers:
        - name: wings-infer
          image: wings-infer:latest                      # CUSTOMIZE
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18000
            - containerPort: 19000
          env:
            - name: DISTRIBUTED
              value: "true"
            - name: MASTER_IP
              value: "CHANGE_ME"                         # CUSTOMIZE: Master 节点 IP
            - name: RANK_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_IPS
              value: "CHANGE_ME,CHANGE_ME"               # CUSTOMIZE
            - name: ENGINE
              value: "sglang"
            - name: DISTRIBUTED_EXECUTOR_BACKEND
              value: "mp"
            - name: MODEL_NAME
              value: "DeepSeek-R1-Distill-Qwen-1.5B"     # CUSTOMIZE
            - name: MODEL_PATH
              value: "/models/DeepSeek-R1-Distill-Qwen-1.5B"
            - name: ENGINE_PORT
              value: "17000"
            - name: PORT
              value: "18000"
            - name: HEALTH_PORT
              value: "19000"
            - name: WINGS_SKIP_PID_CHECK
              value: "true"
            - name: BACKEND_URL
              value: "http://127.0.0.1:17000"
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits: { cpu: "2", memory: "4Gi" }
          readinessProbe:
            httpGet: { path: /health, port: 19000 }
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 72

        - name: engine
          image: lmsysorg/sglang:latest                  # CUSTOMIZE
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              while [ ! -f /shared-volume/start_command.sh ]; do sleep 2; done
              cd /shared-volume && bash start_command.sh
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
            - name: dshm
              mountPath: /dev/shm
          resources:
            requests: { cpu: "4", memory: "16Gi" }
            limits: { cpu: "24", memory: "64Gi" }
