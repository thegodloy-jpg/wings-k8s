# =============================================================================
# SGLang 分布式 - 150 单机双 4090 验证 (Pod 网络模式)
# 
# 场景说明:
#   在 150（7.6.16.150）单机上使用两张 RTX 4090（GPU 0 和 GPU 1）验证
#   SGLang 基于 PyTorch Distributed (NCCL/GLOO) 的分布式推理逻辑。
#   使用 Pod 网络（CNI），每个 Pod 获得独立 IP（10.42.1.x），
#   通过 hostPath IP 交换绕过 CoreDNS 不可达问题。
#
# 与 vLLM Ray 分布式的区别:
#   1. SGLang 不使用 Ray — 直接通过 PyTorch Distributed 通信
#   2. 协调参数: --nnodes N --node-rank R --dist-init-addr HEAD:28030
#   3. 两个 Pod 都运行 sglang.launch_server（无 head/worker 之分在引擎层）
#   4. 分布式端口: 28030 (vs Ray 28020)
#   5. 无需 DISTRIBUTED_EXECUTOR_BACKEND 环境变量
#
# 端口分配（每 Pod 独立 IP，无冲突）:
#   Master (infer-0): 16000(master API) + 17000(sglang) + 18000(proxy) + 19000(health) + 28030(dist init)
#   Worker (infer-1): 16001(worker API) + 17000(sglang rank1) + 19001(health) + 28030(dist init)
#
# NCCL 网络配置:
#   - NCCL_SOCKET_IFNAME=eth0 (Pod 内 CNI 虚拟接口)
#   - GLOO_SOCKET_IFNAME=eth0
#   - NCCL_P2P_DISABLE=1 (同节点不同 Pod 无法 P2P)
#   - NCCL_SHM_DISABLE=1 (不同 Pod 无法共享 /dev/shm)
# =============================================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: wings-infer

---
apiVersion: v1
kind: Service
metadata:
  name: infer-hl
  namespace: wings-infer
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: infer-sglang
  ports:
    - name: engine
      port: 17000
    - name: proxy
      port: 18000
    - name: health
      port: 19000

---
apiVersion: v1
kind: Service
metadata:
  name: infer-api
  namespace: wings-infer
spec:
  selector:
    app.kubernetes.io/name: infer-sglang
    statefulset.kubernetes.io/pod-name: infer-0
  ports:
    - name: proxy
      port: 18000
      targetPort: 18000
    - name: health
      port: 19000
      targetPort: 19000

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: infer
  namespace: wings-infer
spec:
  serviceName: infer-hl
  replicas: 2
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: infer-sglang
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infer-sglang
    spec:
      # 两个 Pod 必须调度到 150 的 k3s agent 节点
      nodeName: 5b590a43256c
      dnsPolicy: Default
      volumes:
      - name: shared-volume
        emptyDir: {}
      - name: model-volume
        hostPath:
          path: /mnt/models
          type: DirectoryOrCreate
      # hostPath IP 交换: 同节点 Pod 通过此目录交换各自的 Pod IP
      - name: ip-exchange
        hostPath:
          path: /tmp/wings-ip-exchange
          type: DirectoryOrCreate
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi
      # GPU 设备: 挂载 GPU 0 和 GPU 1（两张 RTX 4090）
      - name: dev-nvidia0
        hostPath:
          path: /dev/nvidia0
          type: CharDevice
      - name: dev-nvidia1
        hostPath:
          path: /dev/nvidia1
          type: CharDevice
      - name: dev-nvidiactl
        hostPath:
          path: /dev/nvidiactl
          type: CharDevice
      - name: dev-nvidia-uvm
        hostPath:
          path: /dev/nvidia-uvm
          type: CharDevice
      - name: nvidia-libs
        hostPath:
          path: /mnt/nvidia-libs
          type: Directory

      containers:
      # ---- Sidecar: wings-infer ----
      - name: wings-infer
        image: docker.io/library/wings-infer:ray-dist-zhanghui
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
        - |
          # 从 POD_NAME 派生 NODE_RANK
          export NODE_RANK=${POD_NAME##*-}
          # == hostPath IP 交换: 绕过不可用的 CoreDNS ==
          rm -f /ip-exchange/pod-${NODE_RANK}-ip
          echo $POD_IP > /ip-exchange/pod-${NODE_RANK}-ip
          if [ "$NODE_RANK" = "0" ]; then
            export MASTER_IP=$POD_IP
            export HEAD_NODE_ADDR=$POD_IP
            # 等待 worker 写入 IP (最多 120s)
            for i in $(seq 1 60); do [ -f /ip-exchange/pod-1-ip ] && break; sleep 2; done
            WORKER_IP=$(cat /ip-exchange/pod-1-ip 2>/dev/null || echo "unknown")
            export NODE_IPS="${POD_IP},${WORKER_IP}"
          else
            # 等待 master 写入 IP (最多 120s)
            for i in $(seq 1 60); do [ -f /ip-exchange/pod-0-ip ] && break; sleep 2; done
            export MASTER_IP=$(cat /ip-exchange/pod-0-ip 2>/dev/null || echo "unknown")
            export HEAD_NODE_ADDR=$MASTER_IP
            export NODE_IPS="${MASTER_IP},${POD_IP}"
          fi
          echo "[wings] POD_NAME=$POD_NAME NODE_RANK=$NODE_RANK"
          echo "[wings] POD_IP=$POD_IP MASTER_IP=$MASTER_IP HEAD_NODE_ADDR=$HEAD_NODE_ADDR"
          echo "[wings] NODE_IPS=$NODE_IPS"
          exec python -m app.main
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: DISTRIBUTED
          value: "true"
        - name: RANK_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: ENGINE
          value: sglang
        # SGLang 不需要 DISTRIBUTED_EXECUTOR_BACKEND
        - name: TENSOR_PARALLEL_SIZE
          value: "1"
        - name: NNODES
          value: "2"
        - name: MODEL_NAME
          value: DeepSeek-R1-Distill-Qwen-1.5B
        - name: MODEL_PATH
          value: /models/DeepSeek-R1-Distill-Qwen-1.5B
        - name: ENGINE_PORT
          value: "17000"
        - name: PORT
          value: "18000"
        - name: HEALTH_PORT
          value: "19000"
        - name: WINGS_SKIP_PID_CHECK
          value: "true"
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        volumeMounts:
        - name: shared-volume
          mountPath: /shared-volume
        - name: model-volume
          mountPath: /models
          readOnly: true
        - name: ip-exchange
          mountPath: /ip-exchange
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 4Gi

      # ---- Engine: SGLang ----
      - name: engine
        image: docker.io/library/sglang-infer:zhanghui-20260228
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        command: ["/bin/sh", "-c"]
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        # NCCL/GLOO 通信配置 — Pod 网络使用 eth0
        - name: NCCL_SOCKET_IFNAME
          value: eth0
        - name: GLOO_SOCKET_IFNAME
          value: eth0
        - name: NCCL_IB_DISABLE
          value: "1"
        - name: NCCL_NET
          value: Socket
        - name: NCCL_P2P_DISABLE
          value: "1"
        - name: NCCL_SHM_DISABLE
          value: "1"
        - name: NCCL_DEBUG
          value: INFO
        args:
        - |
          ORDINAL=${POD_NAME##*-}
          export CUDA_VISIBLE_DEVICES=$ORDINAL
          # nvidia-smi 位于 /mnt/nvidia-libs，SGLang 启动时需要调用它获取 GPU 显存容量
          export PATH=/mnt/nvidia-libs:${PATH}
          export LD_LIBRARY_PATH=/mnt/nvidia-libs:${LD_LIBRARY_PATH:-}
          echo "[engine] POD_NAME=$POD_NAME ordinal=$ORDINAL GPU=$CUDA_VISIBLE_DEVICES POD_IP=$POD_IP"
          nvidia-smi --query-gpu=index,name,memory.total --format=csv,noheader 2>/dev/null || echo "[engine] nvidia-smi not available"
          echo '[engine] Waiting for start_command.sh...'
          while [ ! -f /shared-volume/start_command.sh ]; do sleep 2; done
          echo '[engine] Executing:'
          cat /shared-volume/start_command.sh
          echo '---'
          cd /shared-volume && bash start_command.sh
        volumeMounts:
        - name: shared-volume
          mountPath: /shared-volume
        - name: model-volume
          mountPath: /models
          readOnly: true
        - name: dev-nvidia0
          mountPath: /dev/nvidia0
        - name: dev-nvidia1
          mountPath: /dev/nvidia1
        - name: dev-nvidiactl
          mountPath: /dev/nvidiactl
        - name: dev-nvidia-uvm
          mountPath: /dev/nvidia-uvm
        - name: nvidia-libs
          mountPath: /mnt/nvidia-libs
        - name: dshm
          mountPath: /dev/shm
        resources:
          requests:
            cpu: "2"
            memory: 4Gi
          limits:
            cpu: "12"
            memory: 32Gi
