# vllm-distributed overlay
# 用途: vLLM + Ray 跨节点分布式推理 (NVIDIA GPU)
# 用法: kubectl apply -k k8s/overlays/vllm-distributed
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - service.yaml
  - statefulset.yaml

namespace: wings-infer

commonLabels:
  app.kubernetes.io/name: infer-vllm
  app.kubernetes.io/component: distributed
