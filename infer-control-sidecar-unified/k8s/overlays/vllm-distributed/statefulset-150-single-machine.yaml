# =============================================================================
# vLLM Ray 分布式 - 150 单机双 4090 验证 (Pod 网络模式)
# 
# 场景说明:
#   在 150（7.6.16.150）单机上使用两张 RTX 4090（GPU 0 和 GPU 1）验证
#   vLLM 基于 Ray 的分布式推理逻辑。
#   使用 Pod 网络（CNI），每个 Pod 获得独立 IP（10.42.1.x），
#   避免 hostNetwork 下两个 Pod 共享宿主 IP 导致角色判断和端口冲突的问题。
#
# 关键设计:
#   1. Pod 网络: 不使用 hostNetwork，由 flannel CNI 分配独立 Pod IP
#   2. hostPath IP 交换: CoreDNS 跨节点不可达（两 k3s 节点 InternalIP 均为 172.17.0.3），
#      改用 /tmp/wings-ip-exchange hostPath 让同节点 Pod 交换各自 Pod IP
#   3. NODE_RANK 由 StatefulSet hostname 序号派生（infer-0→0, infer-1→1）
#   4. CUDA_VISIBLE_DEVICES 同样由序号派生，实现 GPU 隔离
#   5. 去掉 podAntiAffinity，两个 Pod 调度到同一节点
#
# 端口分配（每 Pod 独立 IP，无冲突）:
#   Master (infer-0, 10.42.1.x): 16000(master API) + 17000(vllm) + 18000(proxy) + 19000(health) + 28020(ray head)
#   Worker (infer-1, 10.42.1.y): 16001(worker API) + 19001(health) + Ray worker(动态端口)
#
# NVIDIA Ray 网络配置 (vs Ascend):
#   - NCCL_SOCKET_IFNAME=eth0 (Pod 内 CNI 虚拟接口)
#   - GLOO_SOCKET_IFNAME=eth0 (自动检测)
#   - ray start --num-gpus=1  (不需要 Ascend 的 --resources='{"NPU": 1}')
# =============================================================================

---
apiVersion: v1
kind: Service
metadata:
  name: infer-hl
  namespace: wings-infer
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: infer-vllm
  ports:
    - name: engine
      port: 17000
    - name: proxy
      port: 18000
    - name: health
      port: 19000

---
apiVersion: v1
kind: Service
metadata:
  name: infer-api
  namespace: wings-infer
spec:
  selector:
    app.kubernetes.io/name: infer-vllm
    statefulset.kubernetes.io/pod-name: infer-0
  ports:
    - name: proxy
      port: 18000
      targetPort: 18000
    - name: health
      port: 19000
      targetPort: 19000

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: infer
  namespace: wings-infer
spec:
  serviceName: infer-hl
  replicas: 2
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: infer-vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infer-vllm
    spec:
      # 两个 Pod 必须调度到 150 的 k3s agent 节点
      nodeName: 5b590a43256c
      # 不设 podAntiAffinity — 同机部署
      # Pod 网络: 不使用 hostNetwork，每个 Pod 由 flannel CNI 分配独立 IP
      # DNS: CoreDNS 跨节点不可达（两k3s节点InternalIP都是172.17.0.3），
      #      改用 hostPath 交换 Pod IP
      dnsPolicy: Default
      volumes:
      - name: shared-volume
        emptyDir: {}
      - name: model-volume
        hostPath:
          path: /mnt/models
          type: DirectoryOrCreate
      # hostPath IP 交换: 同节点 Pod 通过此目录交换各自的 Pod IP
      - name: ip-exchange
        hostPath:
          path: /tmp/wings-ip-exchange
          type: DirectoryOrCreate
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi
      # GPU 设备: 挂载 GPU 0 和 GPU 1（两张 RTX 4090）
      # 通过 CUDA_VISIBLE_DEVICES 实现隔离
      - name: dev-nvidia0
        hostPath:
          path: /dev/nvidia0
          type: CharDevice
      - name: dev-nvidia1
        hostPath:
          path: /dev/nvidia1
          type: CharDevice
      - name: dev-nvidiactl
        hostPath:
          path: /dev/nvidiactl
          type: CharDevice
      - name: dev-nvidia-uvm
        hostPath:
          path: /dev/nvidia-uvm
          type: CharDevice
      - name: nvidia-libs
        hostPath:
          path: /mnt/nvidia-libs
          type: Directory

      containers:
      # ---- Sidecar: wings-infer ----
      - name: wings-infer
        image: docker.io/library/wings-infer:ray-dist-zhanghui
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
        - |
          # 从 POD_NAME 派生 NODE_RANK
          export NODE_RANK=${POD_NAME##*-}
          # == hostPath IP 交换: 绕过不可用的 CoreDNS ==
          # 清除自身旧 IP 文件，写入当前 Pod IP
          rm -f /ip-exchange/pod-${NODE_RANK}-ip
          echo $POD_IP > /ip-exchange/pod-${NODE_RANK}-ip
          if [ "$NODE_RANK" = "0" ]; then
            # Master: 自身 IP 即 MASTER_IP
            export MASTER_IP=$POD_IP
            export HEAD_NODE_ADDR=$POD_IP
            # 等待 worker 写入 IP (最多 120s)
            for i in $(seq 1 60); do [ -f /ip-exchange/pod-1-ip ] && break; sleep 2; done
            WORKER_IP=$(cat /ip-exchange/pod-1-ip 2>/dev/null || echo "unknown")
            export NODE_IPS="${POD_IP},${WORKER_IP}"
          else
            # Worker: 等待 master 写入 IP (最多 120s)
            for i in $(seq 1 60); do [ -f /ip-exchange/pod-0-ip ] && break; sleep 2; done
            export MASTER_IP=$(cat /ip-exchange/pod-0-ip 2>/dev/null || echo "unknown")
            export HEAD_NODE_ADDR=$MASTER_IP
            export NODE_IPS="${MASTER_IP},${POD_IP}"
          fi
          echo "[wings] POD_NAME=$POD_NAME NODE_RANK=$NODE_RANK"
          echo "[wings] POD_IP=$POD_IP MASTER_IP=$MASTER_IP HEAD_NODE_ADDR=$HEAD_NODE_ADDR"
          echo "[wings] NODE_IPS=$NODE_IPS"
          exec python -m app.main
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: DISTRIBUTED
          value: "true"
        - name: RANK_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: ENGINE
          value: vllm
        - name: DISTRIBUTED_EXECUTOR_BACKEND
          value: ray
        - name: TENSOR_PARALLEL_SIZE
          value: "1"
        - name: NNODES
          value: "2"
        - name: MODEL_NAME
          value: DeepSeek-R1-Distill-Qwen-1.5B
        - name: MODEL_PATH
          value: /models/DeepSeek-R1-Distill-Qwen-1.5B
        - name: ENGINE_PORT
          value: "17000"
        - name: PORT
          value: "18000"
        - name: HEALTH_PORT
          value: "19000"
        - name: WINGS_SKIP_PID_CHECK
          value: "true"
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        volumeMounts:
        - name: shared-volume
          mountPath: /shared-volume
        - name: model-volume
          mountPath: /models
          readOnly: true
        - name: ip-exchange
          mountPath: /ip-exchange
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 4Gi

      # ---- Engine: vLLM ----
      - name: engine
        image: docker.io/vllm/vllm-openai:v0.13.0
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        command: ["/bin/sh", "-c"]
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        # Pod 网络模式: 使用真实 Pod IP，让 Ray 绑定到可路由的地址
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        args:
        - |
          ORDINAL=${POD_NAME##*-}
          export CUDA_VISIBLE_DEVICES=$ORDINAL
          echo "[engine] POD_NAME=$POD_NAME ordinal=$ORDINAL GPU=$CUDA_VISIBLE_DEVICES POD_IP=$POD_IP"
          echo '[engine] Waiting for start_command.sh...'
          while [ ! -f /shared-volume/start_command.sh ]; do sleep 2; done
          echo '[engine] Executing:'
          cat /shared-volume/start_command.sh
          echo '---'
          export LD_LIBRARY_PATH=/mnt/nvidia-libs:${LD_LIBRARY_PATH:-}
          cd /shared-volume && bash start_command.sh
        volumeMounts:
        - name: shared-volume
          mountPath: /shared-volume
        - name: model-volume
          mountPath: /models
          readOnly: true
        - name: dev-nvidia0
          mountPath: /dev/nvidia0
        - name: dev-nvidia1
          mountPath: /dev/nvidia1
        - name: dev-nvidiactl
          mountPath: /dev/nvidiactl
        - name: dev-nvidia-uvm
          mountPath: /dev/nvidia-uvm
        - name: nvidia-libs
          mountPath: /mnt/nvidia-libs
        - name: dshm
          mountPath: /dev/shm
        resources:
          requests:
            cpu: "2"
            memory: 4Gi
          limits:
            cpu: "12"
            memory: 32Gi
