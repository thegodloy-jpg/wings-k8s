apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: infer
  namespace: wings-infer
spec:
  serviceName: infer-hl
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: infer-vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infer-vllm
    spec:
      nodeSelector:
        kubernetes.io/hostname: ca4109381399
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      volumes:
      - name: shared-volume
        emptyDir: {}
      - name: model-volume
        hostPath:
          path: /mnt/models
          type: DirectoryOrCreate
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 4Gi
      - name: dev-nvidia0
        hostPath:
          path: /dev/nvidia0
          type: CharDevice
      - name: dev-nvidiactl
        hostPath:
          path: /dev/nvidiactl
          type: CharDevice
      - name: dev-nvidia-uvm
        hostPath:
          path: /dev/nvidia-uvm
          type: CharDevice
      - name: nvidia-libs
        hostPath:
          path: /mnt/nvidia-libs
          type: Directory
      containers:
      # ---------------------------------------------------------------
      # wings-infer: Sidecar 容器
      # 引擎和模型参数已写死在 Dockerfile ENTRYPOINT 中:
      #   --engine vllm
      #   --model-name DeepSeek-R1-Distill-Qwen-1.5B
      #   --model-path /models/DeepSeek-R1-Distill-Qwen-1.5B
      #   --device-count 1
      #   --trust-remote-code
      # 此处仅保留 Dockerfile 中没有的运行时配置
      # ---------------------------------------------------------------
      - name: wings-infer
        image: wings-infer:entrypoint-zhanghui
        imagePullPolicy: IfNotPresent
        env:
        - name: WINGS_SKIP_PID_CHECK
          value: "true"
        - name: BACKEND_URL
          value: "http://127.0.0.1:17000"
        volumeMounts:
        - name: shared-volume
          mountPath: /shared-volume
        - name: model-volume
          mountPath: /models
          readOnly: true
      - name: engine
        image: vllm/vllm-openai:v0.13.0
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo '[engine] Waiting for start_command.sh...'
          while [ ! -f /shared-volume/start_command.sh ]; do sleep 2; done
          echo '[engine] start_command.sh found, executing:'
          cat /shared-volume/start_command.sh
          export LD_LIBRARY_PATH=/mnt/nvidia-libs:${LD_LIBRARY_PATH:-}
          cd /shared-volume && bash start_command.sh
        env:
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        - name: CUDA_DEVICE_ORDER
          value: "PCI_BUS_ID"
        - name: VLLM_HOST_IP
          value: "127.0.0.1"
        - name: NCCL_SOCKET_IFNAME
          value: "lo"
        - name: GLOO_SOCKET_IFNAME
          value: "lo"
        volumeMounts:
        - name: shared-volume
          mountPath: /shared-volume
        - name: model-volume
          mountPath: /models
          readOnly: true
        - name: dev-nvidia0
          mountPath: /dev/nvidia0
        - name: dev-nvidiactl
          mountPath: /dev/nvidiactl
        - name: dev-nvidia-uvm
          mountPath: /dev/nvidia-uvm
        - name: nvidia-libs
          mountPath: /mnt/nvidia-libs
        - name: dshm
          mountPath: /dev/shm
