# StatefulSet: SGLang 跨节点分布式推理 (NVIDIA GPU)
# SGLang 使用 --nnodes, --node-rank, --dist-init-addr
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: infer
spec:
  serviceName: infer-hl
  replicas: 2                              # CUSTOMIZE
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: infer-sglang
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infer-sglang
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: infer-sglang
              topologyKey: kubernetes.io/hostname
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      volumes:
        - name: shared-volume
          emptyDir: {}
        - name: accel-volume
          emptyDir: {}                                   # accel 初始化容器产物
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: model-volume
          hostPath:
            path: /mnt/models                           # CUSTOMIZE
            type: DirectoryOrCreate

      # ---- 初始化容器：拷贝 accel 加速文件 ----
      initContainers:
        - name: accel-init
          image: wings-accel:latest                      # CUSTOMIZE
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Copying accel files to shared volume..."
              cp -r /accel/* /accel-volume/
              echo "Accel files copied successfully"
          volumeMounts:
            - name: accel-volume
              mountPath: /accel-volume

      containers:
        - name: wings-infer
          image: wings-infer:latest                      # CUSTOMIZE
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18000
            - containerPort: 19000
          env:
            - name: DISTRIBUTED
              value: "true"
            - name: NNODES
              value: "2"                                 # CUSTOMIZE
            - name: NODE_RANK
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
            - name: HEAD_NODE_ADDR
              value: "CHANGE_ME"                         # CUSTOMIZE
            - name: NODE_IPS
              value: "CHANGE_ME,CHANGE_ME"               # CUSTOMIZE
            - name: ENGINE
              value: "sglang"
            - name: DISTRIBUTED_EXECUTOR_BACKEND
              value: "mp"
            - name: MODEL_NAME
              value: "DeepSeek-R1-Distill-Qwen-1.5B"     # CUSTOMIZE
            - name: MODEL_PATH
              value: "/models/DeepSeek-R1-Distill-Qwen-1.5B"
            - name: ENGINE_PORT
              value: "17000"
            - name: PORT
              value: "18000"
            - name: HEALTH_PORT
              value: "19000"
            - name: WINGS_SKIP_PID_CHECK
              value: "true"
            - name: BACKEND_URL
              value: "http://127.0.0.1:17000"
            - name: ENABLE_ACCEL
              value: "true"                              # CUSTOMIZE: 设为 "false" 禁用加速
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits: { cpu: "2", memory: "4Gi" }
          readinessProbe:
            httpGet: { path: /health, port: 19000 }
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 72

        - name: engine
          image: lmsysorg/sglang:latest                  # CUSTOMIZE
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "[engine] Waiting for start_command.sh..."
              while [ ! -f /shared-volume/start_command.sh ]; do sleep 2; done

              # 根据 ENABLE_ACCEL 决定是否安装加速包
              if [ "$ENABLE_ACCEL" = "true" ]; then
                echo "[engine] Accel is enabled, installing accel packages..."
                if [ -f /accel-volume/install.sh ]; then
                  cd /accel-volume && bash install.sh
                  if [ $? -eq 0 ]; then
                    echo "[engine] Accel packages installed successfully"
                  else
                    echo "[engine] WARNING: Accel install.sh failed (exit code: $?), continuing without accel"
                  fi
                else
                  echo "[engine] WARNING: /accel-volume/install.sh not found, skipping accel installation"
                fi
              else
                echo "[engine] Accel is disabled, skipping installation"
              fi

              echo "[engine] Executing start_command.sh..."
              cd /shared-volume && bash start_command.sh
          env:
            - name: ENABLE_ACCEL
              value: "true"                              # CUSTOMIZE: 与 wings-infer 保持一致
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
            - name: dshm
              mountPath: /dev/shm
            - name: accel-volume
              mountPath: /accel-volume
          resources:
            requests: { cpu: "4", memory: "16Gi" }
            limits: { cpu: "24", memory: "64Gi" }
