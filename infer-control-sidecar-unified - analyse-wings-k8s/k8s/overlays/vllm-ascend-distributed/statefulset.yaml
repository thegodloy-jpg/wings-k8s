# StatefulSet: vLLM-Ascend + Ray 跨节点分布式推理
# 硬件: Ascend 910B2C NPU
# 架构: rank-0 = Ray Head + vLLM serve, rank-1 = Ray Worker
#
# ⚠️ 部署前必须修改标记为 CUSTOMIZE 的参数
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: infer
spec:
  serviceName: infer-hl
  replicas: 2                              # CUSTOMIZE: 节点数
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: infer-vllm-ascend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infer-vllm-ascend
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: infer-vllm-ascend
              topologyKey: kubernetes.io/hostname

      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule

      volumes:
        - name: shared-volume
          emptyDir: {}
        - name: accel-volume
          emptyDir: {}                                   # accel 初始化容器产物
        - name: model-volume
          hostPath:
            path: /mnt/cephfs/models                    # CUSTOMIZE: 模型存储路径
            type: DirectoryOrCreate
        - name: davinci0
          hostPath:
            path: /dev/davinci0
            type: CharDevice
        - name: davinci-manager
          hostPath:
            path: /dev/davinci_manager
            type: CharDevice
        - name: hisi-hdc
          hostPath:
            path: /dev/hisi_hdc
        - name: ascend-driver
          hostPath:
            path: /usr/local/Ascend/driver/lib64/driver  # 仅挂载 HAL 驱动,避免 CANN 版本冲突
            type: DirectoryOrCreate
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi

      # ---- 初始化容器：拷贝 accel 加速文件 ----
      initContainers:
        - name: accel-init
          image: wings-accel:latest                      # CUSTOMIZE
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Copying accel files to shared volume..."
              cp -r /accel/* /accel-volume/
              echo "Accel files copied successfully"
          volumeMounts:
            - name: accel-volume
              mountPath: /accel-volume

      containers:
        # ---------- wings-infer sidecar ----------
        - name: wings-infer
          image: wings-infer:latest                      # CUSTOMIZE: sidecar 镜像
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18000
              name: proxy
            - containerPort: 19000
              name: health
          env:
            - name: WINGS_DEVICE
              value: "ascend"
            - name: DEVICE
              value: "ascend"
            - name: DEVICE_COUNT
              value: "1"
            - name: DISTRIBUTED
              value: "true"
            - name: NNODES
              value: "2"                                 # CUSTOMIZE: 节点数
            - name: NODE_RANK
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
            - name: HEAD_NODE_ADDR
              value: "CHANGE_ME"                         # CUSTOMIZE: rank-0 节点 IP
            - name: NODE_IPS
              value: "CHANGE_ME,CHANGE_ME"               # CUSTOMIZE: 所有节点 IP (逗号分隔)
            - name: ENGINE
              value: "vllm_ascend"
            - name: DISTRIBUTED_EXECUTOR_BACKEND
              value: "ray"
            - name: TENSOR_PARALLEL_SIZE
              value: "1"
            - name: MODEL_NAME
              value: "DeepSeek-R1-Distill-Qwen-1.5B"     # CUSTOMIZE: 模型名称
            - name: MODEL_PATH
              value: "/models/DeepSeek-R1-Distill-Qwen-1.5B"  # CUSTOMIZE: 模型路径
            - name: ENGINE_PORT
              value: "17000"
            - name: PORT
              value: "18000"
            - name: HEALTH_PORT
              value: "19000"
            - name: WINGS_SKIP_PID_CHECK
              value: "true"
            - name: BACKEND_URL
              value: "http://127.0.0.1:17000"
            - name: ENABLE_ACCEL
              value: "true"                              # CUSTOMIZE: 设为 "false" 禁用加速
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 19000
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 72
          livenessProbe:
            httpGet:
              path: /health
              port: 19000
            initialDelaySeconds: 240
            periodSeconds: 30
            failureThreshold: 5

        # ---------- vllm-ascend engine ----------
        - name: engine
          image: quay.io/ascend/vllm-ascend:v0.14.0rc1   # CUSTOMIZE: 引擎镜像
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "[engine] Waiting for start_command.sh..."
              while [ ! -f /shared-volume/start_command.sh ]; do sleep 2; done

              # 根据 ENABLE_ACCEL 决定是否安装加速包
              if [ "$ENABLE_ACCEL" = "true" ]; then
                echo "[engine] Accel is enabled, installing accel packages..."
                if [ -f /accel-volume/install.sh ]; then
                  cd /accel-volume && bash install.sh
                  if [ $? -eq 0 ]; then
                    echo "[engine] Accel packages installed successfully"
                  else
                    echo "[engine] WARNING: Accel install.sh failed (exit code: $?), continuing without accel"
                  fi
                else
                  echo "[engine] WARNING: /accel-volume/install.sh not found, skipping accel installation"
                fi
              else
                echo "[engine] Accel is disabled, skipping installation"
              fi

              echo "[engine] Executing start_command.sh..."
              cd /shared-volume && bash start_command.sh
          env:
            - name: ASCEND_VISIBLE_DEVICES
              value: "0"
            - name: ENABLE_ACCEL
              value: "true"                              # CUSTOMIZE: 与 wings-infer 保持一致
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
            - name: davinci0
              mountPath: /dev/davinci0
            - name: davinci-manager
              mountPath: /dev/davinci_manager
            - name: hisi-hdc
              mountPath: /dev/hisi_hdc
            - name: ascend-driver
              mountPath: /usr/local/Ascend/driver/lib64/driver
              readOnly: true
            - name: dshm
              mountPath: /dev/shm
            - name: accel-volume
              mountPath: /accel-volume
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
            limits:
              cpu: "24"
              memory: "64Gi"
