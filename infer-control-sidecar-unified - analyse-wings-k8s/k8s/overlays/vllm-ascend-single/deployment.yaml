# Deployment: vLLM-Ascend 单机推理 (Ascend 910B NPU)
#
# ⚠️ 部署前必须修改标记为 CUSTOMIZE 的参数
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: infer-vllm-ascend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infer-vllm-ascend
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      volumes:
        - name: shared-volume
          emptyDir: {}
        - name: accel-volume
          emptyDir: {}                                   # accel 初始化容器产物
        - name: model-volume
          hostPath:
            path: /mnt/cephfs/models                    # CUSTOMIZE
            type: DirectoryOrCreate
        - name: davinci0
          hostPath:
            path: /dev/davinci0
            type: CharDevice
        - name: davinci-manager
          hostPath:
            path: /dev/davinci_manager
            type: CharDevice
        - name: hisi-hdc
          hostPath:
            path: /dev/hisi_hdc
        - name: ascend-driver
          hostPath:
            path: /usr/local/Ascend/driver/lib64/driver
            type: DirectoryOrCreate

      # ---- 初始化容器：拷贝 accel 加速文件 ----
      initContainers:
        - name: accel-init
          image: wings-accel:latest                      # CUSTOMIZE
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Copying accel files to shared volume..."
              cp -r /accel/* /accel-volume/
              echo "Accel files copied successfully"
          volumeMounts:
            - name: accel-volume
              mountPath: /accel-volume

      containers:
        - name: wings-infer
          image: wings-infer:latest                      # CUSTOMIZE
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18000
              name: proxy
            - containerPort: 19000
              name: health
          env:
            - name: WINGS_DEVICE
              value: "ascend"
            - name: DEVICE
              value: "ascend"
            - name: ENGINE
              value: "vllm_ascend"
            - name: MODEL_NAME
              value: "DeepSeek-R1-Distill-Qwen-1.5B"     # CUSTOMIZE
            - name: MODEL_PATH
              value: "/models/DeepSeek-R1-Distill-Qwen-1.5B"  # CUSTOMIZE
            - name: ENGINE_PORT
              value: "17000"
            - name: PORT
              value: "18000"
            - name: HEALTH_PORT
              value: "19000"
            - name: WINGS_SKIP_PID_CHECK
              value: "true"
            - name: BACKEND_URL
              value: "http://127.0.0.1:17000"
            - name: ENABLE_ACCEL
              value: "true"                              # CUSTOMIZE: 设为 "false" 禁用加速
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 19000
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 36
          livenessProbe:
            httpGet:
              path: /health
              port: 19000
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5

        - name: engine
          image: quay.io/ascend/vllm-ascend:v0.14.0rc1   # CUSTOMIZE
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "[engine] Waiting for start_command.sh..."
              while [ ! -f /shared-volume/start_command.sh ]; do sleep 2; done

              # 根据 ENABLE_ACCEL 决定是否安装加速包
              if [ "$ENABLE_ACCEL" = "true" ]; then
                echo "[engine] Accel is enabled, installing accel packages..."
                if [ -f /accel-volume/install.sh ]; then
                  cd /accel-volume && bash install.sh
                  if [ $? -eq 0 ]; then
                    echo "[engine] Accel packages installed successfully"
                  else
                    echo "[engine] WARNING: Accel install.sh failed (exit code: $?), continuing without accel"
                  fi
                else
                  echo "[engine] WARNING: /accel-volume/install.sh not found, skipping accel installation"
                fi
              else
                echo "[engine] Accel is disabled, skipping installation"
              fi

              echo "[engine] Executing start_command.sh..."
              cd /shared-volume && bash start_command.sh
          env:
            - name: ASCEND_VISIBLE_DEVICES
              value: "0"
            - name: ENABLE_ACCEL
              value: "true"                              # CUSTOMIZE: 与 wings-infer 保持一致
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
            - name: davinci0
              mountPath: /dev/davinci0
            - name: davinci-manager
              mountPath: /dev/davinci_manager
            - name: hisi-hdc
              mountPath: /dev/hisi_hdc
            - name: ascend-driver
              mountPath: /usr/local/Ascend/driver/lib64/driver
              readOnly: true
            - name: accel-volume
              mountPath: /accel-volume
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
            limits:
              cpu: "16"
              memory: "48Gi"
