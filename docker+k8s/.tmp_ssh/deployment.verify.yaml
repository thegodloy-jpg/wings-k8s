apiVersion: apps/v1
kind: Deployment
metadata:
  name: wings-infer
  namespace: wings-verify
  labels:
    app: wings-infer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wings-infer
  template:
    metadata:
      labels:
        app: wings-infer
    spec:
      volumes:
        - name: shared-volume
          emptyDir: {}
        - name: model-volume
          hostPath:
            path: /mnt/models
            type: DirectoryOrCreate
        - name: accel-volume
          emptyDir: {}

      initContainers:
        - name: accel-init
          image: wings-accel:verify-20260228-112530
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Copying accel files to shared volume..."
              cp -r /accel/* /accel-volume/
              echo "Accel files copied successfully"
          volumeMounts:
            - name: accel-volume
              mountPath: /accel-volume

      containers:
        - name: wings-infer
          image: wings-infer:verify-20260228-112530
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18000
              name: proxy
            - containerPort: 19000
              name: health
          env:
            - name: ENGINE_TYPE
              value: "vllm"
            - name: ENGINE_PORT
              value: "17000"
            - name: PORT
              value: "18000"
            - name: HEALTH_PORT
              value: "19000"
            - name: WINGS_PORT
              value: "18000"
            - name: MODEL_NAME
              value: "DeepSeek-R1-Distill-Qwen-1.5B"
            - name: MODEL_PATH
              value: "/models/DeepSeek-R1-Distill-Qwen-1.5B"
            - name: TP_SIZE
              value: "1"
            - name: MAX_MODEL_LEN
              value: "8192"
            - name: ENABLE_ACCEL
              value: "false"
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 19000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 19000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5

        - name: vllm-engine
          image: vllm/vllm-openai:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for start command..."
              while [ ! -f /shared-volume/start_command.sh ]; do
                sleep 1
              done

              if [ "$ENABLE_ACCEL" = "true" ]; then
                echo "Accel is enabled, installing accel packages..."
                cd /accel-volume
                bash install.sh
                echo "Accel packages installed successfully"
              else
                echo "Accel is disabled, skipping installation"
              fi

              echo "Start command found, executing..."
              cd /shared-volume
              bash start_command.sh &
              ENGINE_PID=$!

              echo "Waiting for engine to start on port 17000..."
              while ! nc -z 127.0.0.1 17000 2>/dev/null; do
                sleep 2
              done
              echo "Engine is listening on port 17000"

              echo "Engine started successfully, monitoring PID=$ENGINE_PID"
              wait $ENGINE_PID
              EXIT_CODE=$?
              echo "Engine exited with code $EXIT_CODE"
              exit $EXIT_CODE
          env:
            - name: ENABLE_ACCEL
              value: "false"
            - name: VLLM_TARGET_DEVICE
              value: "cpu"
            - name: VLLM_LOGGING_LEVEL
              value: "DEBUG"
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
            - name: accel-volume
              mountPath: /accel-volume
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
