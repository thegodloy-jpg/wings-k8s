##############################################################################
# vLLM 单机验证 — CLI args 模式（方案 A）
#
# 与之前的 env var 模式不同：
#   - 引擎参数通过 ENTRYPOINT args 显式传给 wings_start.sh 的 CLI 接口
#   - YAML 直观展示 --engine vllm --model-name ...
#   - GPU: A100 (device 0)，CUDA_VISIBLE_DEVICES=0
#
# 部署: scp + docker cp + kubectl apply -f /tmp/vllm-single.yaml
##############################################################################
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: infer
  namespace: wings-infer
spec:
  serviceName: infer-hl
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: infer-vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infer-vllm
    spec:
      nodeSelector:
        kubernetes.io/hostname: ca4109381399
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      volumes:
      - name: shared-volume
        emptyDir: {}
      - name: model-volume
        hostPath:
          path: /mnt/models
          type: DirectoryOrCreate
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 4Gi
      - name: dev-nvidia0
        hostPath:
          path: /dev/nvidia0
          type: CharDevice
      - name: dev-nvidiactl
        hostPath:
          path: /dev/nvidiactl
          type: CharDevice
      - name: dev-nvidia-uvm
        hostPath:
          path: /dev/nvidia-uvm
          type: CharDevice
      - name: nvidia-libs
        hostPath:
          path: /mnt/nvidia-libs
          type: Directory
      containers:
      ###################################################################
      # Sidecar 容器 — ENTRYPOINT ["bash", "/app/wings_start.sh"]
      #
      # 所有引擎参数通过 args (CLI) 显式传入，不再依赖 env vars
      # wings_start.sh 解析 CLI → 导出 env → exec python -m app.main
      # app.main 生成 /shared-volume/start_command.sh 并启动 proxy+health
      ###################################################################
      - name: wings-infer
        image: wings-infer:unified-zhanghui
        imagePullPolicy: IfNotPresent
        # ENTRYPOINT 已在 Dockerfile 中定义:
        #   ENTRYPOINT ["bash", "/app/wings_start.sh"]
        # 下面的 args 直接传给 wings_start.sh 的 CLI 接口
        args:
        - --engine
        - vllm
        - --model-name
        - DeepSeek-R1-Distill-Qwen-1.5B
        - --model-path
        - /models/DeepSeek-R1-Distill-Qwen-1.5B
        - --port
        - "18000"
        - --device-count           # 映射为 tensor_parallel_size
        - "1"
        - --trust-remote-code
        - --enable-auto-tool-choice
        env:
        # 仅保留没有 CLI flag 对应的必要 env vars
        - name: WINGS_SKIP_PID_CHECK
          value: "true"
        - name: BACKEND_URL
          value: "http://127.0.0.1:17000"
        volumeMounts:
        - name: shared-volume
          mountPath: /shared-volume
        - name: model-volume
          mountPath: /models
          readOnly: true
      ###################################################################
      # Engine 容器 — vLLM v0.13.0
      #
      # 等待 sidecar 生成 /shared-volume/start_command.sh 后执行
      # 共享卷是两个容器之间的唯一通信通道
      ###################################################################
      - name: engine
        image: vllm/vllm-openai:v0.13.0
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        command: ["/bin/bash", "-c"]
        args:
        - |
          echo '[engine] Waiting for /shared-volume/start_command.sh ...'
          while [ ! -f /shared-volume/start_command.sh ]; do sleep 2; done

          echo '========== /shared-volume 内容 =========='
          ls -la /shared-volume/
          echo '========== start_command.sh 内容 =========='
          cat /shared-volume/start_command.sh
          echo '=========================================='

          export LD_LIBRARY_PATH="/mnt/nvidia-libs:${LD_LIBRARY_PATH:-}"
          cd /shared-volume && bash start_command.sh
        env:
        # GPU 选择: A100 = device 0
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        - name: CUDA_DEVICE_ORDER
          value: "PCI_BUS_ID"
        # k3s-in-Docker 网络修复（c10d hostname hang）
        - name: VLLM_HOST_IP
          value: "127.0.0.1"
        - name: NCCL_SOCKET_IFNAME
          value: "lo"
        - name: GLOO_SOCKET_IFNAME
          value: "lo"
        - name: NCCL_DEBUG
          value: "WARN"
        volumeMounts:
        - name: shared-volume
          mountPath: /shared-volume
        - name: model-volume
          mountPath: /models
          readOnly: true
        - name: dev-nvidia0
          mountPath: /dev/nvidia0
        - name: dev-nvidiactl
          mountPath: /dev/nvidiactl
        - name: dev-nvidia-uvm
          mountPath: /dev/nvidia-uvm
        - name: nvidia-libs
          mountPath: /mnt/nvidia-libs
        - name: dshm
          mountPath: /dev/shm
