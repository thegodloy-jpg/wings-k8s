---
# ── Headless Service (用于 StatefulSet DNS) ──────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: infer-sglang-hl
  namespace: wings-infer
spec:
  clusterIP: None
  selector:
    app: infer-sglang-tp
  ports:
  - port: 17000
    name: engine
  - port: 18000
    name: proxy
  - port: 19000
    name: health
---
# ── 对外 Service (通过 HEAD proxy) ───────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: infer-sglang-tp-svc
  namespace: wings-infer
spec:
  type: NodePort
  selector:
    app: infer-sglang-tp
    infer-sglang-role: head
  ports:
  - port: 18000
    targetPort: 18000
    nodePort: 31801
    name: proxy
  - port: 19000
    targetPort: 19000
    nodePort: 31901
    name: health
