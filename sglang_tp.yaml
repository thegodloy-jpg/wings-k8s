# SGLang 双机分布式验证（TP=2）
# HEAD (rank 0): 7.6.52.148 (ca4109381399), GPU A100-PCIE-40GB
# WORKER (rank 1): 7.6.16.150 (5b590a43256c), GPU RTX 4090
# dist-init-addr: 172.17.0.3:20000 (HEAD 的桥接 IP + 固定端口)
# 通信路径: WORKER→HEAD 经由 k3s-agent OUTPUT DNAT + .148 PREROUTING DNAT
#
# 前置条件:
#   1. sglang-infer:zhanghui-20260228 已导入两个节点的 containerd
#   2. 所有节点已添加 DNAT 规则 (参见 add_rules_148.sh / add_rules_150.sh)
#   3. HEAD OUTPUT DNAT 已排除端口 20000 (防止自连接循环)
---
# ── HEAD (rank 0): .148 ca4109381399 ─────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: infer-sglang-head
  namespace: wings-infer
spec:
  serviceName: infer-sglang-hl
  replicas: 1
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: infer-sglang-tp
      infer-sglang-role: head
  template:
    metadata:
      labels:
        app: infer-sglang-tp
        infer-sglang-role: head
    spec:
      nodeSelector:
        kubernetes.io/hostname: ca4109381399
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      volumes:
      - name: shared-volume
        emptyDir: {}
      - name: model-volume
        hostPath:
          path: /mnt/models
          type: DirectoryOrCreate
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 4Gi
      - name: dev-nvidia0
        hostPath:
          path: /dev/nvidia0
          type: CharDevice
      - name: dev-nvidiactl
        hostPath:
          path: /dev/nvidiactl
          type: CharDevice
      - name: dev-nvidia-uvm
        hostPath:
          path: /dev/nvidia-uvm
          type: CharDevice
      - name: nvidia-libs
        hostPath:
          path: /mnt/nvidia-libs
          type: Directory
      containers:
      # ── 控制容器 (wings-infer) ─────────────────────────────────────────────
      - name: wings-infer
        image: wings-infer:dist-nv-dev-zhanghui
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 18000
          name: proxy
        - containerPort: 19000
          name: health
        env:
        - name: ENGINE
          value: "sglang"
        - name: MODEL_NAME
          value: "DeepSeek-R1-Distill-Qwen-1.5B"
        - name: MODEL_PATH
          value: "/models/DeepSeek-R1-Distill-Qwen-1.5B"
        - name: ENGINE_PORT
          value: "17000"
        - name: PORT
          value: "18000"
        - name: HEALTH_PORT
          value: "19000"
        - name: WINGS_SKIP_PID_CHECK
          value: "true"
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        volumeMounts:
        - name: shared-volume
          mountPath: /shared-volume
        - name: model-volume
          mountPath: /models
          readOnly: true
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 4Gi
      # ── 引擎容器 (sglang-engine rank 0) ───────────────────────────────────
      - name: sglang-engine
        image: sglang-infer:zhanghui-20260228
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        command: ["/bin/sh", "-c"]
        args:
        - |
          # [multi-node] 直接启动 SGLang rank 0，不等待 start_command.sh
          export CUDA_DEVICE_ORDER=PCI_BUS_ID
          export CUDA_VISIBLE_DEVICES=GPU-3ad4c258-3338-a49d-b6db-5059e89d9811
          export LD_LIBRARY_PATH=/usr/lib/nvidia-host:${LD_LIBRARY_PATH:-}
          export PATH=/usr/lib/nvidia-host:${PATH}
          export NCCL_SOCKET_IFNAME=eth0
          export GLOO_SOCKET_IFNAME=eth0
          export NCCL_IB_DISABLE=1
          exec python3 -m sglang.launch_server \
            --model-path /models/DeepSeek-R1-Distill-Qwen-1.5B \
            --context-length 5120 \
            --trust-remote-code \
            --dtype auto \
            --kv-cache-dtype auto \
            --mem-fraction-static 0.9 \
            --max-running-requests 32 \
            --chunked-prefill-size 4096 \
            --random-seed 0 \
            --disable-chunked-prefix-cache \
            --host 0.0.0.0 \
            --port 17000 \
            --served-model-name DeepSeek-R1-Distill-Qwen-1.5B \
            --dist-init-addr 172.17.0.3:20000 \
            --nnodes 2 \
            --node-rank 0 \
            --tp-size 2
        env:
        - name: CUDA_DEVICE_ORDER
          value: "PCI_BUS_ID"
        - name: CUDA_VISIBLE_DEVICES
          value: "GPU-3ad4c258-3338-a49d-b6db-5059e89d9811"
        - name: NVIDIA_VISIBLE_DEVICES
          value: "GPU-3ad4c258-3338-a49d-b6db-5059e89d9811"
        - name: NCCL_SOCKET_IFNAME
          value: "eth0"
        - name: GLOO_SOCKET_IFNAME
          value: "eth0"
        - name: NCCL_IB_DISABLE
          value: "1"
        volumeMounts:
        - name: shared-volume
          mountPath: /shared-volume
        - name: model-volume
          mountPath: /models
          readOnly: true
        - name: dev-nvidia0
          mountPath: /dev/nvidia0
        - name: dev-nvidiactl
          mountPath: /dev/nvidiactl
        - name: dev-nvidia-uvm
          mountPath: /dev/nvidia-uvm
        - name: nvidia-libs
          mountPath: /usr/lib/nvidia-host
        - name: dshm
          mountPath: /dev/shm
        resources:
          requests:
            cpu: "4"
            memory: 8Gi
          limits:
            cpu: "24"
            memory: 64Gi
---
# ── WORKER (rank 1): .150 5b590a43256c ───────────────────────────────────────
